#####################################################################
# printer.cfg — Top-level Klipper configuration
# IDEX printer — two independent toolheads on shared Y/Z gantry
#####################################################################

[include mainboard.cfg]
[include toolhead.cfg]
[include stepper_x.cfg]
[include z_axis.cfg]
[include offset.cfg]
[include cartographer.cfg]

#####################################################################
# Printer Kinematics
#####################################################################

[printer]
kinematics:           idex
max_velocity:         300
max_accel:            3000
max_z_velocity:       20
max_z_accel:          200
square_corner_velocity: 5.0

#####################################################################
# Idle Timeout
#####################################################################

[idle_timeout]
timeout: 1800   # 30 minutes — steppers/heaters off if idle

#####################################################################
# Homing & Bed Leveling
# Adjust mesh bounds to match your bed size
#####################################################################

[safe_z_home]
# Cartographer is on T0 — T0 must be active when Z homing.
# home_xy_position should place the SCANNER (not nozzle) over bed centre.
# Subtract cartographer x_offset/y_offset from your bed centre coords.
home_xy_position: 150, 150   # Adjust: bed_centre - scanner_offset
speed:            80
z_hop:            10
z_hop_speed:      20
move_to_previous: False

[bed_mesh]
speed:                120
horizontal_move_z:    2             # Cartographer scans very close to bed
mesh_min:             10, 10        # Adjust: must account for scanner x/y offset
mesh_max:             290, 290      # Adjust: must account for scanner x/y offset
probe_count:          10, 10        # Cartographer supports dense meshes efficiently
algorithm:            bicubic
bicubic_tension:      0.2
zero_reference_position: 150, 150   # Should match safe_z_home position

#####################################################################
# Input Shaper (fill in after resonance testing)
#####################################################################

[input_shaper]
# shaper_freq_x: 0
# shaper_freq_y: 0
# shaper_type:   mzv

#####################################################################
# Miscellaneous
#####################################################################

[pause_resume]

[respond]

[display_status]

[virtual_sdcard]
path: ~/printer_data/gcodes

#####################################################################
# M106 / M107 Fan Routing Macros
# Routes slicer fan commands to the active toolhead's part cooling fan
#####################################################################

[gcode_macro M106]
description: Set part cooling fan speed for active toolhead
gcode:
  {% set speed = (params.S | default(255)) | int %}
  {% set pct = (speed / 255.0) %}
  {% if printer.toolhead.extruder == "extruder" %}
    SET_FAN_SPEED FAN=fan_t0 SPEED={pct}
  {% else %}
    SET_FAN_SPEED FAN=fan_t1 SPEED={pct}
  {% endif %}

[gcode_macro M107]
description: Turn off part cooling fan for active toolhead
gcode:
  {% if printer.toolhead.extruder == "extruder" %}
    SET_FAN_SPEED FAN=fan_t0 SPEED=0
  {% else %}
    SET_FAN_SPEED FAN=fan_t1 SPEED=0
  {% endif %}

#####################################################################
# Tool Change Macros
#####################################################################

# Park positions — adjust to your physical X limits
[gcode_macro _TOOLCHANGE_VARS]
variable_t0_park_x:      10.0   # T0 parks here (X min side)
variable_t1_park_x:     400.0   # T1 parks here (X max side)
variable_park_speed:    18000   # mm/min travel speed for park move
variable_standby_offset:   50   # °C to drop when parked
variable_z_drop_mm:       5.0   # mm to drop Z before park move
variable_t0_print_temp:     0   # set by PRINT_START from slicer param
variable_t1_print_temp:     0   # set by PRINT_START from slicer param
gcode:  # variable holder

[gcode_macro T0]
description: Park T1 at standby temp, activate T0, restore Z and T0 temp
gcode:
  {% set v          = printer["gcode_macro _TOOLCHANGE_VARS"] %}
  {% set t0_restore = v.t0_print_temp | float %}
  {% set homed      = 'z' in printer.toolhead.homed_axes %}
  {% set saved_z    = printer.toolhead.position.z if homed else 0 %}
  {% if printer.toolhead.extruder == "extruder1" %}
    SAVE_GCODE_STATE NAME=toolchange_state
    {% if homed %}
      G91
      G1 Z{v.z_drop_mm} F900
      G90
    {% endif %}
    # Drop T1 to standby
    {% set t1_standby = [v.t1_print_temp | float - v.standby_offset, 0] | max %}
    {% if v.t1_print_temp > 0 %}
      M104 T1 S{t1_standby}
    {% endif %}
    # Park T1
    SET_DUAL_CARRIAGE CARRIAGE=1
    G0 X{v.t1_park_x} F{v.park_speed}
    RESTORE_GCODE_STATE NAME=toolchange_state MOVE=0
  {% endif %}
  ACTIVATE_EXTRUDER EXTRUDER=extruder
  SET_DUAL_CARRIAGE CARRIAGE=0
  SET_GCODE_OFFSET X=0 Y=0 Z=0 MOVE=0
  # Wait for T0 to reach print temp while still parked
  {% if t0_restore > 0 %}
    M109 T0 S{t0_restore}
  {% endif %}
  # Now restore Z and return to print position
  {% if homed %}
    G90
    G1 Z{saved_z} F900
  {% endif %}

[gcode_macro T1]
description: Park T0 at standby temp, activate T1, restore Z and T1 temp
gcode:
  {% set v          = printer["gcode_macro _TOOLCHANGE_VARS"] %}
  {% set svv        = printer.save_variables.variables %}
  {% set x_off      = svv.t1_x_offset | default(0) | float %}
  {% set y_off      = svv.t1_y_offset | default(0) | float %}
  {% set z_off      = svv.t1_z_offset | default(0) | float %}
  {% set t1_restore = v.t1_print_temp | float %}
  {% set homed      = 'z' in printer.toolhead.homed_axes %}
  {% set saved_z    = printer.toolhead.position.z if homed else 0 %}
  {% if printer.toolhead.extruder == "extruder" %}
    SAVE_GCODE_STATE NAME=toolchange_state
    {% if homed %}
      G91
      G1 Z{v.z_drop_mm} F900
      G90
    {% endif %}
    # Drop T0 to standby
    {% set t0_standby = [v.t0_print_temp | float - v.standby_offset, 0] | max %}
    {% if v.t0_print_temp > 0 %}
      M104 T0 S{t0_standby}
    {% endif %}
    # Park T0
    SET_DUAL_CARRIAGE CARRIAGE=0
    G0 X{v.t0_park_x} F{v.park_speed}
    RESTORE_GCODE_STATE NAME=toolchange_state MOVE=0
  {% endif %}
  ACTIVATE_EXTRUDER EXTRUDER=extruder1
  SET_DUAL_CARRIAGE CARRIAGE=1
  SET_GCODE_OFFSET X={x_off} Y={y_off} Z={z_off} MOVE=0
  # Wait for T1 to reach print temp while still parked
  {% if t1_restore > 0 %}
    M109 T1 S{t1_restore}
  {% endif %}
  # Now restore Z and return to print position
  {% if homed %}
    G90
    G1 Z{saved_z} F900
  {% endif %}

#####################################################################
# Start / End Print Macros
# Customise to your slicer's start/end g-code calls
#####################################################################

[gcode_macro PRINT_START]
gcode:
  {% set BED_TEMP    = params.BED    | default(60)  | float %}
  {% set T0_TEMP     = params.T0     | default(0)   | float %}
  {% set T1_TEMP     = params.T1     | default(0)   | float %}
  # Store slicer temps so T0/T1 tool-change macros always restore correctly
  SET_GCODE_VARIABLE MACRO=_TOOLCHANGE_VARS VARIABLE=t0_print_temp VALUE={T0_TEMP}
  SET_GCODE_VARIABLE MACRO=_TOOLCHANGE_VARS VARIABLE=t1_print_temp VALUE={T1_TEMP}
  M140 S{BED_TEMP}                    # Start bed heating
  APPLY_TOOL_OFFSET                   # Load saved T1 offsets
  T0                                  # Cartographer is on T0 — must be active for homing
  G28                                 # Home XY; Z override homes to Zmax endstops
  Z_TILT_ADJUST                       # Level gantry via Cartographer probe
  BED_MESH_CALIBRATE                  # Cartographer scan — T0 must remain active
  M190 S{BED_TEMP}                    # Wait for bed temp
  {% if T0_TEMP > 0 %}
    M104 T0 S{T0_TEMP}
  {% endif %}
  {% if T1_TEMP > 0 %}
    M104 T1 S{T1_TEMP}
  {% endif %}
  {% if T0_TEMP > 0 %}
    M109 T0 S{T0_TEMP}
  {% endif %}
  {% if T1_TEMP > 0 %}
    M109 T1 S{T1_TEMP}
  {% endif %}

[gcode_macro PRINT_END]
gcode:
  M400                                # Wait for moves to finish
  G92 E0                              # Reset extruder position
  G1 E-5 F3600                        # Retract filament
  G91                                 # Relative positioning
  G0 Z10 F3000                        # Lift Z
  G90                                 # Absolute positioning
  DEACTIVATE_COPY_MIRROR_MODE         # Return to normal IDEX if in copy/mirror
  G0 X5 Y{printer.toolhead.axis_maximum.y - 10} F6000  # Park T0
  T1
  G0 X{printer.toolhead.axis_maximum.x - 5} F6000      # Park T1
  TURN_OFF_HEATERS
  M107
  M84

#####################################################################
# IDEX Copy & Mirror Modes
#
# COPY   — both carriages move in the same X direction, same speed.
#          T1 starts at an X offset from T0.  Prints two identical
#          parts simultaneously side-by-side.
#
# MIRROR — T1 moves in the opposite X direction to T0.
#          T1 starts at the mirror-image X position.
#          Prints two mirrored parts simultaneously.
#
# Variables to set:
#   copy_x_start   — X position T0 homes to before entering copy mode
#   copy_x_t1      — X position T1 is placed at before copy mode engages
#                    (= T0 start + half bed width for symmetric copy)
#   mirror_x_t1    — X position T1 is placed at before mirror mode engages
#                    (= bed_max_x - copy_x_start for symmetric mirror)
#
# Input shaper values per mode can be filled in once measured.
# Leave at 0 to skip shaper changes.
#####################################################################

[gcode_macro _COPY_MIRROR_VARS]
variable_copy_x_start:    5.0    # T0 X position when entering copy mode
variable_copy_x_t1:     155.0    # T1 X position when entering copy mode
variable_mirror_x_t1:   295.0    # T1 X position when entering mirror mode
variable_mode:            0      # 0=normal 1=copy 2=mirror — do not edit
# Input shaper overrides per mode (set to 0 to skip)
variable_copy_shaper_freq_x:    0
variable_copy_shaper_freq_y:    0
variable_mirror_shaper_freq_x:  0
variable_mirror_shaper_freq_y:  0
gcode:  # variable holder

[gcode_macro ACTIVATE_COPY_MODE]
description: Engage IDEX copy mode — prints two identical parts simultaneously
gcode:
  {% set v = printer["gcode_macro _COPY_MIRROR_VARS"] %}
  RESPOND TYPE=echo MSG="Activating COPY mode"
  # Bring both carriages to primary mode first to allow independent moves
  SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
  G90
  G1 X{v.copy_x_t1} F{printer["gcode_macro _TOOLCHANGE_VARS"].park_speed}
  SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
  ACTIVATE_EXTRUDER EXTRUDER=extruder
  G1 X{v.copy_x_start} F{printer["gcode_macro _TOOLCHANGE_VARS"].park_speed}
  # Engage copy mode and sync extruder motion
  SET_DUAL_CARRIAGE CARRIAGE=1 MODE=COPY
  SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder
  SET_GCODE_VARIABLE MACRO=_COPY_MIRROR_VARS VARIABLE=mode VALUE=1
  # Optional input shaper override for copy mode
  {% if v.copy_shaper_freq_x > 0 %}
    SET_INPUT_SHAPER SHAPER_FREQ_X={v.copy_shaper_freq_x} SHAPER_FREQ_Y={v.copy_shaper_freq_y}
  {% endif %}
  RESPOND TYPE=echo MSG="COPY mode active — T1 offset from T0 by {v.copy_x_t1 - v.copy_x_start} mm"

[gcode_macro ACTIVATE_MIRROR_MODE]
description: Engage IDEX mirror mode — prints two mirrored parts simultaneously
gcode:
  {% set v = printer["gcode_macro _COPY_MIRROR_VARS"] %}
  RESPOND TYPE=echo MSG="Activating MIRROR mode"
  # Bring both carriages to primary mode first to allow independent moves
  SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
  G90
  G1 X{v.mirror_x_t1} F{printer["gcode_macro _TOOLCHANGE_VARS"].park_speed}
  SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
  ACTIVATE_EXTRUDER EXTRUDER=extruder
  G1 X{v.copy_x_start} F{printer["gcode_macro _TOOLCHANGE_VARS"].park_speed}
  # Engage mirror mode and sync extruder motion
  SET_DUAL_CARRIAGE CARRIAGE=1 MODE=MIRROR
  SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder
  SET_GCODE_VARIABLE MACRO=_COPY_MIRROR_VARS VARIABLE=mode VALUE=2
  # Optional input shaper override for mirror mode
  {% if v.mirror_shaper_freq_x > 0 %}
    SET_INPUT_SHAPER SHAPER_FREQ_X={v.mirror_shaper_freq_x} SHAPER_FREQ_Y={v.mirror_shaper_freq_y}
  {% endif %}
  RESPOND TYPE=echo MSG="MIRROR mode active"

[gcode_macro DEACTIVATE_COPY_MIRROR_MODE]
description: Return both carriages to normal independent IDEX mode
gcode:
  {% set v = printer["gcode_macro _COPY_MIRROR_VARS"] %}
  {% if v.mode != 0 %}
    RESPOND TYPE=echo MSG="Deactivating copy/mirror mode — returning to IDEX"
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_GCODE_VARIABLE MACRO=_COPY_MIRROR_VARS VARIABLE=mode VALUE=0
    # Restore input shaper to normal values if they were overridden
    {% if v.copy_shaper_freq_x > 0 or v.mirror_shaper_freq_x > 0 %}
      SET_INPUT_SHAPER SHAPER_FREQ_X={printer.configfile.settings.input_shaper.shaper_freq_x} SHAPER_FREQ_Y={printer.configfile.settings.input_shaper.shaper_freq_y}
    {% endif %}
  {% endif %}


#####################################################################
# printer.cfg — Top-level Klipper configuration
# IDEX printer — two independent toolheads on shared Y/Z gantry
#####################################################################


[include mainsail.cfg]
[include macros.cfg]
[include mainboard.cfg]
[include toolhead.cfg]
[include x_axis.cfg]
[include y_axis.cfg]
[include z_axis.cfg]
[include homing.cfg]
[include offset.cfg]
[include nozzle_cam.cfg]
[include cartographer.cfg]


#####################################################################
# Printer Kinematics
#####################################################################

[printer]
kinematics:           cartesian
max_velocity:         300
max_accel:            3000
max_z_velocity:       20
max_z_accel:          200
square_corner_velocity: 5.0

#####################################################################
# Idle Timeout
#####################################################################

[idle_timeout]
timeout: 1800   # 30 minutes — steppers/heaters off if idle

#####################################################################
# Arc Support (required for G2/G3 circular brush motion)
#####################################################################

[gcode_arcs]
resolution: 0.5   # mm per arc segment — smaller = smoother circles

#####################################################################
# Input Shaper (fill in after resonance testing)
#####################################################################

[input_shaper]
# shaper_freq_x: 0
# shaper_freq_y: 0
# shaper_type:   mzv

#####################################################################
# Miscellaneous
#####################################################################

[pause_resume]

[respond]

[display_status]

[virtual_sdcard]
path: ~/printer_data/gcodes

[save_variables]
filename: ~/printer_data/config/tool_offsets.cfg


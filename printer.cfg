#####################################################################
# printer.cfg — Top-level Klipper configuration
# IDEX printer — two independent toolheads on shared Y/Z gantry
#####################################################################

[include mainboard.cfg]
[include toolhead.cfg]
[include stepper_x.cfg]

#####################################################################
# Printer Kinematics
#####################################################################

[printer]
kinematics:           idex
max_velocity:         300
max_accel:            3000
max_z_velocity:       20
max_z_accel:          200
square_corner_velocity: 5.0

#####################################################################
# Idle Timeout
#####################################################################

[idle_timeout]
timeout: 1800   # 30 minutes — steppers/heaters off if idle

#####################################################################
# Homing & Bed Leveling
# Adjust mesh bounds to match your bed size
#####################################################################

[safe_z_home]
home_xy_position: 150, 150   # Center of bed — adjust as needed
speed:            80
z_hop:            10
z_hop_speed:      20

[bed_mesh]
speed:              120
horizontal_move_z:  5
mesh_min:           10, 10       # Adjust to your probe's reachable area
mesh_max:           290, 290     # Adjust to your probe's reachable area
probe_count:        5, 5
algorithm:          bicubic

#####################################################################
# Input Shaper (fill in after resonance testing)
#####################################################################

[input_shaper]
# shaper_freq_x: 0
# shaper_freq_y: 0
# shaper_type:   mzv

#####################################################################
# Miscellaneous
#####################################################################

[pause_resume]

[respond]

[display_status]

[virtual_sdcard]
path: ~/printer_data/gcodes

#####################################################################
# M106 / M107 Fan Routing Macros
# Routes slicer fan commands to the active toolhead's part cooling fan
#####################################################################

[gcode_macro M106]
description: Set part cooling fan speed for active toolhead
gcode:
  {% set speed = (params.S | default(255)) | int %}
  {% set pct = (speed / 255.0) %}
  {% if printer.toolhead.extruder == "extruder" %}
    SET_FAN_SPEED FAN=fan_t0 SPEED={pct}
  {% else %}
    SET_FAN_SPEED FAN=fan_t1 SPEED={pct}
  {% endif %}

[gcode_macro M107]
description: Turn off part cooling fan for active toolhead
gcode:
  {% if printer.toolhead.extruder == "extruder" %}
    SET_FAN_SPEED FAN=fan_t0 SPEED=0
  {% else %}
    SET_FAN_SPEED FAN=fan_t1 SPEED=0
  {% endif %}

#####################################################################
# Tool Change Macros
#####################################################################

[gcode_macro T0]
description: Activate T0 (left toolhead)
gcode:
  ACTIVATE_EXTRUDER EXTRUDER=extruder
  SET_DUAL_CARRIAGE CARRIAGE=0

[gcode_macro T1]
description: Activate T1 (right toolhead)
gcode:
  ACTIVATE_EXTRUDER EXTRUDER=extruder1
  SET_DUAL_CARRIAGE CARRIAGE=1

#####################################################################
# Start / End Print Macros
# Customise to your slicer's start/end g-code calls
#####################################################################

[gcode_macro PRINT_START]
gcode:
  {% set BED_TEMP    = params.BED    | default(60)  | float %}
  {% set T0_TEMP     = params.T0     | default(0)   | float %}
  {% set T1_TEMP     = params.T1     | default(0)   | float %}
  M140 S{BED_TEMP}                    # Start bed heating
  G28                                 # Home all axes
  BED_MESH_CALIBRATE                  # Generate mesh
  M190 S{BED_TEMP}                    # Wait for bed temp
  {% if T0_TEMP > 0 %}
    M104 T0 S{T0_TEMP}
  {% endif %}
  {% if T1_TEMP > 0 %}
    M104 T1 S{T1_TEMP}
  {% endif %}
  {% if T0_TEMP > 0 %}
    M109 T0 S{T0_TEMP}
  {% endif %}
  {% if T1_TEMP > 0 %}
    M109 T1 S{T1_TEMP}
  {% endif %}

[gcode_macro PRINT_END]
gcode:
  M400                                # Wait for moves to finish
  G92 E0                              # Reset extruder position
  G1 E-5 F3600                        # Retract filament
  G91                                 # Relative positioning
  G0 Z10 F3000                        # Lift Z
  G90                                 # Absolute positioning
  G0 X5 Y{printer.toolhead.axis_maximum.y - 10} F6000  # Park T0
  T1
  G0 X{printer.toolhead.axis_maximum.x - 5} F6000      # Park T1
  TURN_OFF_HEATERS
  M107
  M84

#####################################################################
# Toolhead Configuration
# Board: Fysetc H36 v2 (x2) — connected via USB
# T0 → mcu TH0  |  T1 → mcu TH1
#####################################################################

#--------------------------------------------------------------------
# MCU Definitions
# Run: ls /dev/serial/by-id/*  after connecting both boards and
# substitute the correct paths below.
#--------------------------------------------------------------------

[mcu TH0]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_T0SERIALHERE

[mcu TH1]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_T1SERIALHERE

#####################################################################
# Extruder — T0
#####################################################################

[extruder]
step_pin:             TH0:PB9
dir_pin:              TH0:PC15
enable_pin:          !TH0:PC14
microsteps:           64
rotation_distance:    4.637        # Orbiter v2 — 7.5:1 internal ratio already included
full_steps_per_rotation: 200
nozzle_diameter:      0.400
filament_diameter:    1.750
heater_pin:           TH0:PB13
sensor_type:          PT1000
sensor_pin:           TH0:PA3
pullup_resistor:      2200
min_temp:             0
max_temp:             350
min_extrude_temp:     170
max_extrude_only_distance: 500
pressure_advance:     0.0          # Calibrate per filament type

[tmc2209 extruder]
uart_pin:             TH0:PB6
diag_pin:            ^TH0:PA13
run_current:          0.600        # Adjust for your specific motor
stealthchop_threshold: 0
interpolate:          False

#--------------------------------------------------------------------
# T0 Heater Fan  (PB15)
#--------------------------------------------------------------------

[heater_fan hotend_fan_t0]
pin:          TH0:PB15
heater:       extruder
heater_temp:  50.0
fan_speed:    1.0

#--------------------------------------------------------------------
# T0 Part Cooling Fans  (PB12 + PB2 grouped)
#--------------------------------------------------------------------

[multi_pin part_cooling_pins_t0]
pins: TH0:PB12, TH0:PB2

[fan_generic fan_t0]
pin:             multi_pin:part_cooling_pins_t0
kick_start_time: 0.5
off_below:       0.10

#####################################################################
# Extruder — T1
#####################################################################

[extruder1]
step_pin:             TH1:PB9
dir_pin:              TH1:PC15
enable_pin:          !TH1:PC14
microsteps:           64
rotation_distance:    4.637        # Orbiter v2 — 7.5:1 internal ratio already included
full_steps_per_rotation: 200
nozzle_diameter:      0.400
filament_diameter:    1.750
heater_pin:           TH1:PB13
sensor_type:          PT1000
sensor_pin:           TH1:PA3
pullup_resistor:      2200
min_temp:             0
max_temp:             350
min_extrude_temp:     170
max_extrude_only_distance: 500
pressure_advance:     0.0          # Calibrate per filament type

[tmc2209 extruder1]
uart_pin:             TH1:PB6
diag_pin:            ^TH1:PA13
run_current:          0.600        # Adjust for your specific motor
stealthchop_threshold: 0
interpolate:          False

#--------------------------------------------------------------------
# T1 Heater Fan  (PB15)
#--------------------------------------------------------------------

[heater_fan hotend_fan_t1]
pin:          TH1:PB15
heater:       extruder1
heater_temp:  50.0
fan_speed:    1.0

#--------------------------------------------------------------------
# T1 Part Cooling Fans  (PB12 + PB2 grouped)
#--------------------------------------------------------------------

[multi_pin part_cooling_pins_t1]
pins: TH1:PB12, TH1:PB2

[fan_generic fan_t1]
pin:             multi_pin:part_cooling_pins_t1
kick_start_time: 0.5
off_below:       0.10

#####################################################################
# Filament Sensors
# Pin: PA9 on each toolhead board
# Pull-up enabled (^). If your sensor logic is inverted — filament
# present triggers HIGH instead of LOW — add ! before the pin name.
#####################################################################

[filament_switch_sensor filament_t0]
switch_pin:      ^TH0:PA9
pause_on_runout: False          # pause handled in FILAMENT_RUNOUT macro
runout_gcode:    FILAMENT_RUNOUT T=0
insert_gcode:    FILAMENT_INSERT T=0

[filament_switch_sensor filament_t1]
switch_pin:      ^TH1:PA9
pause_on_runout: False
runout_gcode:    FILAMENT_RUNOUT T=1
insert_gcode:    FILAMENT_INSERT T=1

#####################################################################
# ADXL345 Accelerometers — H36 v2 onboard (one per toolhead)
#
# Pins are for the H36 v2 hardware SPI1 bus — verify against the
# Fysetc H36 v2 schematic if readings look wrong.
#
# IDEX resonance testing:
#   T0 X + Y:  TEST_RESONANCES AXIS=X   (uses TH0 by default)
#              TEST_RESONANCES AXIS=Y
#   T1 X only: TEST_RESONANCES AXIS=X ACCEL_CHIP="adxl345 TH1"
#              (switch to T1 carriage first)
#####################################################################

[adxl345 TH0]
cs_pin:                  TH0:PA4
spi_software_sclk_pin:   TH0:PA5
spi_software_miso_pin:   TH0:PA6
spi_software_mosi_pin:   TH0:PA7

[adxl345 TH1]
cs_pin:                  TH1:PA4
spi_software_sclk_pin:   TH1:PA5
spi_software_miso_pin:   TH1:PA6
spi_software_mosi_pin:   TH1:PA7

[resonance_tester]
accel_chip:   adxl345 TH0
probe_points:
    200, 208, 20          # bed centre — nozzle coords

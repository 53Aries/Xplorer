#####################################################################
# Toolhead Configuration
# Board: Fysetc H36 v2 (x2) — connected via USB
# T0 → mcu toolhead0  |  T1 → mcu toolhead1
#####################################################################

#--------------------------------------------------------------------
# MCU Definitions
# Run: ls /dev/serial/by-id/*  after connecting both boards and
# substitute the correct paths below.
#--------------------------------------------------------------------

[mcu toolhead0]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_T0SERIALHERE

[mcu toolhead1]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_T1SERIALHERE

#####################################################################
# Extruder — T0
#####################################################################

[extruder]
step_pin:             toolhead0:PB9
dir_pin:              toolhead0:PC15
enable_pin:          !toolhead0:PC14
microsteps:           16
rotation_distance:    4.637        # Orbiter v2 — 7.5:1 internal ratio already included
full_steps_per_rotation: 200
nozzle_diameter:      0.400
filament_diameter:    1.750
heater_pin:           toolhead0:PB13
sensor_type:          PT1000
sensor_pin:           toolhead0:PA3
pullup_resistor:      2200
min_temp:             0
max_temp:             350
min_extrude_temp:     170
max_extrude_only_distance: 500
pressure_advance:     0.0          # Calibrate per filament type

[tmc2209 extruder]
uart_pin:             toolhead0:PB6
diag_pin:            ^toolhead0:PA13
run_current:          0.600        # Adjust for your specific motor
stealthchop_threshold: 0
interpolate:          False

#--------------------------------------------------------------------
# T0 Heater Fan  (PB15)
#--------------------------------------------------------------------

[heater_fan hotend_fan_t0]
pin:          toolhead0:PB15
heater:       extruder
heater_temp:  50.0
fan_speed:    1.0

#--------------------------------------------------------------------
# T0 Part Cooling Fans  (PB12 + PB2 grouped)
#--------------------------------------------------------------------

[multi_pin part_cooling_pins_t0]
pins: toolhead0:PB12, toolhead0:PB2

[fan_generic fan_t0]
pin:             multi_pin:part_cooling_pins_t0
kick_start_time: 0.5
off_below:       0.10

#####################################################################
# Extruder — T1
#####################################################################

[extruder1]
step_pin:             toolhead1:PB9
dir_pin:              toolhead1:PC15
enable_pin:          !toolhead1:PC14
microsteps:           16
rotation_distance:    4.637        # Orbiter v2 — 7.5:1 internal ratio already included
full_steps_per_rotation: 200
nozzle_diameter:      0.400
filament_diameter:    1.750
heater_pin:           toolhead1:PB13
sensor_type:          PT1000
sensor_pin:           toolhead1:PA3
pullup_resistor:      2200
min_temp:             0
max_temp:             350
min_extrude_temp:     170
max_extrude_only_distance: 500
pressure_advance:     0.0          # Calibrate per filament type

[tmc2209 extruder1]
uart_pin:             toolhead1:PB6
diag_pin:            ^toolhead1:PA13
run_current:          0.600        # Adjust for your specific motor
stealthchop_threshold: 0
interpolate:          False

#--------------------------------------------------------------------
# T1 Heater Fan  (PB15)
#--------------------------------------------------------------------

[heater_fan hotend_fan_t1]
pin:          toolhead1:PB15
heater:       extruder1
heater_temp:  50.0
fan_speed:    1.0

#--------------------------------------------------------------------
# T1 Part Cooling Fans  (PB12 + PB2 grouped)
#--------------------------------------------------------------------

[multi_pin part_cooling_pins_t1]
pins: toolhead1:PB12, toolhead1:PB2

[fan_generic fan_t1]
pin:             multi_pin:part_cooling_pins_t1
kick_start_time: 0.5
off_below:       0.10
#####################################################################
# Chamber Heater — PTC with SSR control
#
# PTC heater  → SSR → M8P PA1
# Chamber NTC → M8P PB0  (control sensor)
# PTC internal NTC → M8P PC5  (safety monitor only — triggers
#                               emergency stop if PTC overheats)
# PTC fan     → M8P PA4
#####################################################################

[heater_generic chamber_heater]
heater_pin:   PA1
sensor_type:  NTC 100K beta 3950
sensor_pin:   PB0
min_temp:     0
max_temp:     80
control:      watermark   # bang-bang with hysteresis — suits slow chamber thermal mass
max_delta:    2.0         # heater on below (target-2°C), off above target

[verify_heater chamber_heater]
max_error:        300    # cumulative error budget — high to accommodate slow chamber heat-up
check_gain_time:  180    # seconds allowed to rise 2°C — chambers are slow thermal masses
hysteresis:       5      # °C either side of target considered in-range
heating_gain:     2      # minimum °C rise expected within check_gain_time

[temperature_fan chamber_heater_fan]
pin:             PA4
sensor_type:     NTC 100K beta 3950
sensor_pin:      PC5
min_temp:        0
max_temp:        120         # emergency stop if PTC body overheats
target_temp:     40.0        # fan on above 40°C, off below 38°C
control:         watermark   # bang-bang — full speed or fully off
max_delta:       2.0
min_speed:       0.0
max_speed:       1.0
kick_start_time: 0.5         # brief full-power burst to ensure reliable spin-up
shutdown_speed:  1.0         # full speed on Klipper shutdown/crash to protect PTC from overheating



#####################################################################
# Macros
#####################################################################

# M141 — OrcaSlicer "set chamber temperature" (no wait)
[gcode_macro M141]
description: Set chamber temperature without waiting (OrcaSlicer M141 S<temp>)
gcode:
  {% set temp = params.S | default(0) | float %}
  SET_HEATER_TEMPERATURE HEATER=chamber_heater TARGET={temp}

# M191 — OrcaSlicer "set chamber temperature and wait"
[gcode_macro M191]
description: Set chamber temperature and wait until reached (OrcaSlicer M191 S<temp>)
gcode:
  {% set temp = params.S | default(0) | float %}
  {% if temp > 0 %}
    SET_HEATER_TEMPERATURE HEATER=chamber_heater TARGET={temp}
    RESPOND TYPE=echo MSG="Waiting for chamber to reach {temp}°C..."
    TEMPERATURE_WAIT SENSOR="heater_generic chamber_heater" MINIMUM={temp}
    RESPOND TYPE=echo MSG="Chamber reached {temp}°C"
  {% endif %}

[gcode_macro SET_CHAMBER_TEMP]
description: Set chamber target temperature. SET_CHAMBER_TEMP TEMP=45
gcode:
  {% set temp = params.TEMP | default(0) | float %}
  M141 S{temp}

[gcode_macro CHAMBER_WAIT]
description: Set and wait for chamber temperature. CHAMBER_WAIT TEMP=45
gcode:
  {% set temp = params.TEMP | default(0) | float %}
  M191 S{temp}

[gcode_macro CHAMBER_OFF]
description: Turn off chamber heater
gcode:
  M141 S0

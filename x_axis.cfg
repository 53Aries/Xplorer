#####################################################################
# Stepper X Configuration — IDEX
# Both carriages run from Fysetc H36 v2 toolhead boards.
# TMC2240 connected via software SPI on the H36 MCU.
#
# T0 → stepper_x    (TH0 MCU, homes to X min)
# T1 → dual_carriage (TH1 MCU, homes to X max)
#####################################################################

#####################################################################
# T0 — Primary X Carriage
#####################################################################

[stepper_x]
step_pin:                TH0:PB7
dir_pin:                 TH0:PA1
enable_pin:             !TH0:PA14
microsteps:              128
rotation_distance:       32            # GT2 2mm pitch × 16t pulley
full_steps_per_rotation: 200
endstop_pin:             TH0:PA10
position_endstop:        -10
position_min:            -11
position_max:            340           # T0 physical max — bed right edge (X=400) reached by T1
homing_speed:            50
second_homing_speed:     20
homing_retract_dist:     10

[tmc2240 stepper_x]
cs_pin:                  TH0:PA13
spi_software_mosi_pin:   TH0:PB11
spi_software_miso_pin:   TH0:PA15
spi_software_sclk_pin:   TH0:PB10
run_current:             0.80          # Adjust for your motor
rref:                    12000         # 12k external resistor (H36 default)
stealthchop_threshold:   999999             # 0 = spreadCycle; 999999 = stealthChop

#####################################################################
# T1 — Dual Carriage (second X axis)
#####################################################################

[dual_carriage]
axis:                    x
step_pin:                TH1:PB7
dir_pin:                 TH1:PA1
enable_pin:             !TH1:PA14
microsteps:              128
rotation_distance:       32            # GT2 2mm pitch × 16t pulley — must match stepper_x
full_steps_per_rotation: 200
endstop_pin:             TH1:PA10
position_endstop:        410           # T1 homes to X max (right endstop)
position_min:            80            # prevents carriage collision with T0
position_max:            411           # 1 mm past endstop
homing_speed:            50
second_homing_speed:     20
homing_retract_dist:     10

[tmc2240 dual_carriage]
cs_pin:                  TH1:PA13
spi_software_mosi_pin:   TH1:PB11
spi_software_miso_pin:   TH1:PA15
spi_software_sclk_pin:   TH1:PB10
run_current:             0.80          # Adjust for your motor
rref:                    12000         # 12k external resistor (H36 default)
stealthchop_threshold:   999999             # 0 = spreadCycle; 999999 = stealthChop

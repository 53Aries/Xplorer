#####################################################################
# Stepper X Configuration — IDEX
# Both carriages run from Fysetc H36 v2 toolhead boards.
# TMC2240 connected via software SPI on the H36 MCU.
#
# T0 → stepper_x    (toolhead0 MCU, homes to X min)
# T1 → dual_carriage (toolhead1 MCU, homes to X max)
#####################################################################

#####################################################################
# T0 — Primary X Carriage
#####################################################################

[stepper_x]
step_pin:                toolhead0:PB7
dir_pin:                 toolhead0:PA1
enable_pin:             !toolhead0:PA14
microsteps:              128
rotation_distance:       40            # Adjust for your belt/pulley
full_steps_per_rotation: 200
endstop_pin:             toolhead0:PA10
position_endstop:        0
position_min:            -1
position_max:            340           # FORMBOT IDEX official value
homing_speed:            50
homing_retract_dist:     5

[tmc2240 stepper_x]
cs_pin:                  toolhead0:PA13
spi_software_mosi_pin:   toolhead0:PB11
spi_software_miso_pin:   toolhead0:PA15
spi_software_sclk_pin:   toolhead0:PB10
run_current:             1.00          # Adjust for your motor
rref:                    12000         # 12k external resistor (H36 default)
stealthchop_threshold:   999999             # 0 = spreadCycle; 999999 = stealthChop

#####################################################################
# T1 — Dual Carriage (second X axis)
#####################################################################

[dual_carriage]
axis:                    x
step_pin:                toolhead1:PB7
dir_pin:                 toolhead1:PA1
enable_pin:             !toolhead1:PA14
microsteps:              128
rotation_distance:       40            # Must match stepper_x value
full_steps_per_rotation: 200
endstop_pin:             toolhead1:PA10
position_endstop:        421           # T1 homes to X max (right endstop)
position_min:            80            # FORMBOT minimum — prevents carriage collision
position_max:            422           # FORMBOT IDEX official value
homing_speed:            50
homing_retract_dist:     5

[tmc2240 dual_carriage]
cs_pin:                  toolhead1:PA13
spi_software_mosi_pin:   toolhead1:PB11
spi_software_miso_pin:   toolhead1:PA15
spi_software_sclk_pin:   toolhead1:PB10
run_current:             1.00          # Adjust for your motor
rref:                    12000         # 12k external resistor (H36 default)
stealthchop_threshold:   999999             # 0 = spreadCycle; 999999 = stealthChop

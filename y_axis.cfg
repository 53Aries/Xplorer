#####################################################################
# Y Axis Configuration
#
# Dual-motor shared gantry — physical endstop homing
#   stepper_y  (right motor) — Mainboard M1 — step PE6 / dir PE5 — endstop PF4 (M1-STOP)
#   stepper_y1 (left motor)  — Mainboard M2 — step PE2 / dir PE1 — endstop PF3 (M2-STOP)
#
# Both motors use the Manta M8P software SPI bus (PA5/PA6/PA7).
# Physical NO switches wired to M1-STOP and M2-STOP headers (shorts to GND when triggered).
# Each motor stops independently on its own endstop, squaring the gantry.
#
# Y homes to Ymax (back of printer, positive direction).
#####################################################################

#####################################################################
# Stepper Y — Right Motor (Mainboard M1)
#####################################################################

[stepper_y]
step_pin:                PE6
dir_pin:                !PE5             # invert if gantry moves wrong way
enable_pin:             !PC14
microsteps:              32
rotation_distance:       40
full_steps_per_rotation: 200
endstop_pin:             ^PF4            # M1-STOP — physical endstop (NO switch, shorts to GND)
position_endstop:        450
position_max:            450
position_min:            0
homing_speed:            80
second_homing_speed:     20
homing_retract_dist:     10
homing_positive_dir:     true            # home toward Ymax (back of printer)

[tmc2240 stepper_y]
cs_pin:                  PC13
spi_software_sclk_pin:   PA5
spi_software_mosi_pin:   PA7
spi_software_miso_pin:   PA6
rref:                    12000
run_current:             1.200
hold_current:            0.600
stealthchop_threshold:   999999

#####################################################################
# Stepper Y1 — Left Motor (Mainboard M2)
#####################################################################

[stepper_y1]
step_pin:                PE2
dir_pin:                 PE1             # invert if gantry skews during move
enable_pin:             !PE4
microsteps:              32
rotation_distance:       40
full_steps_per_rotation: 200
endstop_pin:             ^PF3            # M2-STOP — physical endstop (NO switch, shorts to GND)

[tmc2240 stepper_y1]
cs_pin:                  PE3
spi_software_sclk_pin:   PA5
spi_software_mosi_pin:   PA7
spi_software_miso_pin:   PA6
rref:                    12000
run_current:             1.200
hold_current:            0.600
stealthchop_threshold:   999999

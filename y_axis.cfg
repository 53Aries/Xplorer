#####################################################################
# Y Axis Configuration
#
# Dual-motor shared gantry — sensorless homing via TMC2240 StallGuard
#   stepper_y  (right motor) — Mainboard M1 — step PE6 / dir PE5
#   stepper_y1 (left motor)  — Mainboard M2 — step PE2 / dir PE1
#
# Both motors use the Manta M8P software SPI bus (PA5/PA6/PA7).
# Diag0 pins (M1-STOP=PF4, M2-STOP=PF3) provide the virtual endstop.
#
# Y homes to Ymax (back of printer, positive direction).
# homing_retract_dist MUST be 0 for sensorless virtual endstop.
#
# Tune driver_SGT per printer — start at 1, increase if false triggers,
# decrease if the motor stalls before reaching the frame.
#####################################################################

#####################################################################
# Stepper Y — Right Motor (Mainboard M1)
#####################################################################

[stepper_y]
step_pin:                PE6
dir_pin:                !PE5             # invert if gantry moves wrong way
enable_pin:             !PC14
microsteps:              32
rotation_distance:       40
full_steps_per_rotation: 200
endstop_pin:             tmc2240_stepper_y:virtual_endstop
position_endstop:        450
position_max:            450
position_min:            0
homing_speed:            80
second_homing_speed:     40
homing_retract_dist:     0                # must be 0 for sensorless virtual endstop
homing_positive_dir:     true            # home toward Ymax (back of printer)

[tmc2240 stepper_y]
cs_pin:                  PC13
spi_software_sclk_pin:   PA5
spi_software_mosi_pin:   PA7
spi_software_miso_pin:   PA6
rref:                    12000
run_current:             1.200
hold_current:            0.600
stealthchop_threshold:   999999          # stealthchop for normal motion; switched to spreadcycle during homing
diag0_pin:              ^!PF4            # M1-STOP — virtual endstop signal
driver_SGT:              1               # StallGuard threshold — tune per printer

#####################################################################
# Stepper Y1 — Left Motor (Mainboard M2)
#####################################################################

[stepper_y1]
step_pin:                PE2
dir_pin:                 PE1             # invert if gantry skews during move
enable_pin:             !PE4
microsteps:              32
rotation_distance:       40
full_steps_per_rotation: 200
endstop_pin:             tmc2240_stepper_y1:virtual_endstop  # independent stallguard stop

[tmc2240 stepper_y1]
cs_pin:                  PE3
spi_software_sclk_pin:   PA5
spi_software_mosi_pin:   PA7
spi_software_miso_pin:   PA6
rref:                    12000
run_current:             1.200
hold_current:            0.600
stealthchop_threshold:   999999          # stealthchop for normal motion; switched to spreadcycle during homing
diag0_pin:              ^!PF3            # M2-STOP — StallGuard virtual endstop
driver_SGT:              1

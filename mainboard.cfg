#####################################################################
# Mainboard Configuration
# Replace BOARD_NAME and serial path with your actual main board.
# Fill in pin names from your board's pin diagram / schematic.
#####################################################################

#--------------------------------------------------------------------
# Main MCU
# Run: ls /dev/serial/by-id/*  (USB) or set: serial: /dev/ttyAMA0
# for UART on Raspberry Pi header boards (e.g. Octopus, Spider, etc.)
#--------------------------------------------------------------------

[mcu]
serial: /dev/serial/by-id/usb-Klipper_MAINBOARD_SERIAL_HERE
# baud: 250000   # Uncomment if using UART

#####################################################################
# Stepper — Y  (see y_axis.cfg — dual TMC2240 sensorless homing)
#####################################################################

#####################################################################
# Stepper — Z  (see z_axis.cfg — 3-motor config with Zmax endstops)
#####################################################################

#####################################################################
# Heated Bed
#####################################################################

[heater_bed]
heater_pin:           MAIN_BED_HEAT    # Replace with actual pin
sensor_type:          Generic 3950     # Adjust to your thermistor type
sensor_pin:           MAIN_BED_THERM   # Replace with actual pin
min_temp:             0
max_temp:             130
control:              pid
pid_kp:               60.0             # Run PID_CALIBRATE HEATER=heater_bed
pid_ki:               2.0
pid_kd:               400.0

#####################################################################
# Bed Probe
# Cartographer eddy scanner on T0 replaces [probe].
# See cartographer.cfg — do NOT define [probe] here.
#####################################################################

#####################################################################
# BTT Relay V1.2  — PSU power control
# CTRL pin → PD14 on M8P
# HIGH = relay closed (PSU on), LOW = relay open (PSU off)
#####################################################################

[output_pin ps_on_pin]
pin:            PD14
value:          1       # relay ON at startup
shutdown_value: 1       # relay stays ON when Klipper exits / crashes

[gcode_macro POWER_OFF]
description: Cut PSU power via BTT Relay after a short delay
gcode:
    M84                           # disable steppers
    TURN_OFF_HEATERS
    G4 P2000                      # wait 2 s for heaters to acknowledge
    SET_PIN PIN=ps_on_pin VALUE=0 # open relay → PSU off


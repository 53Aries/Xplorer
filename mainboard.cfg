#####################################################################
# Mainboard Configuration
# Replace BOARD_NAME and serial path with your actual main board.
# Fill in pin names from your board's pin diagram / schematic.
#####################################################################

#--------------------------------------------------------------------
# Main MCU
# Run: ls /dev/serial/by-id/*  (USB) or set: serial: /dev/ttyAMA0
# for UART on Raspberry Pi header boards (e.g. Octopus, Spider, etc.)
#--------------------------------------------------------------------

[mcu]
serial: /dev/serial/by-id/usb-Klipper_MAINBOARD_SERIAL_HERE
# baud: 250000   # Uncomment if using UART

#####################################################################
# Stepper — Y
#####################################################################

[stepper_y]
step_pin:             MAIN_Y_STEP      # Replace with actual pin
dir_pin:              MAIN_Y_DIR       # Replace with actual pin
enable_pin:          !MAIN_Y_EN        # Replace with actual pin
microsteps:           16
rotation_distance:    40               # Adjust for belt/pulley combo
full_steps_per_rotation: 200
endstop_pin:          MAIN_Y_STOP      # Replace with actual pin
position_endstop:     0
position_min:         0
position_max:         300              # Adjust to your Y travel
homing_speed:         50

[tmc2209 stepper_y]
uart_pin:             MAIN_Y_UART      # Replace with actual pin
run_current:          0.800
stealthchop_threshold: 0
interpolate:          False

#####################################################################
# Stepper — Z
# Add [stepper_z1], [stepper_z2] etc. for multi-Z gantries
#####################################################################

[stepper_z]
step_pin:             MAIN_Z_STEP      # Replace with actual pin
dir_pin:              MAIN_Z_DIR       # Replace with actual pin
enable_pin:          !MAIN_Z_EN        # Replace with actual pin
microsteps:           16
rotation_distance:    8                # Adjust for leadscrew pitch
full_steps_per_rotation: 200
endstop_pin:          probe:z_virtual_endstop   # Use if probe is Z endstop
# endstop_pin:        MAIN_Z_STOP     # Uncomment if using a physical stop
position_min:        -5               # Allow slight negative for tramming
position_max:         300             # Adjust to your Z travel

[tmc2209 stepper_z]
uart_pin:             MAIN_Z_UART      # Replace with actual pin
run_current:          0.800
stealthchop_threshold: 0
interpolate:          False

#####################################################################
# Heated Bed
#####################################################################

[heater_bed]
heater_pin:           MAIN_BED_HEAT    # Replace with actual pin
sensor_type:          Generic 3950     # Adjust to your thermistor type
sensor_pin:           MAIN_BED_THERM   # Replace with actual pin
min_temp:             0
max_temp:             130
control:              pid
pid_kp:               60.0             # Run PID_CALIBRATE HEATER=heater_bed
pid_ki:               2.0
pid_kd:               400.0

#####################################################################
# Bed Probe
# Used for Z homing (probe:z_virtual_endstop) and bed mesh.
# Replace pin with your actual bed probe pin.
#####################################################################

[probe]
pin:                  MAIN_PROBE_PIN   # Replace with actual pin
x_offset:             0                # Adjust to probe offset from nozzle
y_offset:             0
z_offset:             0                # Calibrate with PROBE_CALIBRATE → SAVE_CONFIG
speed:                5
samples:              3
sample_retract_dist:  3.0
samples_result:       median
samples_tolerance:    0.010
samples_tolerance_retries: 3

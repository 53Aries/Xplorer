#####################################################################
# Input Shaper Calibration — per-toolhead IDEX
#
# T0 full (X + Y):  CALIBRATE_SHAPER_T0  — fully automated
# T1 X only:        CALIBRATE_SHAPER_T1  — measures, prints recommendation
# Both in sequence: CALIBRATE_SHAPER_ALL
#
# Y is a shared gantry — calibrated once with T0, applies to both.
# T1 X is measured separately with the TH1 onboard accelerometer.
# SHAPER_CALIBRATE does not support a runtime chip override, so T1 X
# uses TEST_RESONANCES + calibrate_shaper.py via shell command.
#
# Workflow:
#   1. CALIBRATE_SHAPER_T0  → auto-applies T0 X + Y shaper values
#   2. CALIBRATE_SHAPER_T1  → prints recommended T1 X shaper values
#   3. Apply T1 result manually:
#        SET_INPUT_SHAPER SHAPER_TYPE_X=<type> SHAPER_FREQ_X=<freq>
#   4. SAVE_CONFIG           → persists all pending shaper changes
#####################################################################

[gcode_shell_command _analyze_shaper_t1_x]
command:    bash -c "latest=$(ls -t /tmp/resonances_x_*.csv 2>/dev/null | head -1) && [ -n \"$latest\" ] && ~/klipper/scripts/calibrate_shaper.py \"$latest\" -o /tmp/shaper_t1_x.png || echo 'No resonance CSV found — run CALIBRATE_SHAPER_T1 first'"
timeout:    60
verbose:    True

[gcode_macro CALIBRATE_SHAPER_T0]
description: Auto-calibrate input shaper for T0 X and Y using TH0 accelerometer
gcode:
  {% if not 'x' in printer.toolhead.homed_axes or
        not 'y' in printer.toolhead.homed_axes or
        not 'z' in printer.toolhead.homed_axes %}
    G28
  {% endif %}
  T0
  G90
  G1 Z10 F{20 * 60}
  G1 X200 Y208 F{150 * 60}
  RESPOND TYPE=echo MSG="=== Calibrating T0 X shaper (TH0 accelerometer) ==="
  SHAPER_CALIBRATE AXIS=X
  RESPOND TYPE=echo MSG="=== Calibrating Y shaper (shared gantry) ==="
  SHAPER_CALIBRATE AXIS=Y
  RESPOND TYPE=echo MSG="=== T0 done — run SAVE_CONFIG to persist ==="

[gcode_macro CALIBRATE_SHAPER_T1]
description: Measure T1 X resonances with TH1 accelerometer and print shaper recommendation
gcode:
  {% if not 'x' in printer.toolhead.homed_axes or
        not 'y' in printer.toolhead.homed_axes or
        not 'z' in printer.toolhead.homed_axes %}
    G28
  {% endif %}
  T1
  G90
  G1 Z10 F{20 * 60}
  G1 X200 Y208 F{150 * 60}
  RESPOND TYPE=echo MSG="=== Measuring T1 X resonances (TH1 accelerometer) ==="
  TEST_RESONANCES AXIS=X ACCEL_CHIP="adxl345 TH1"
  RESPOND TYPE=echo MSG="=== Analysing — recommended values will appear below ==="
  RUN_SHELL_COMMAND CMD=_analyze_shaper_t1_x
  RESPOND TYPE=echo MSG="=== Apply T1 X result: SET_INPUT_SHAPER SHAPER_TYPE_X=<type> SHAPER_FREQ_X=<freq> ==="
  RESPOND TYPE=echo MSG="=== Then SAVE_CONFIG to persist all pending shaper changes ==="

[gcode_macro CALIBRATE_SHAPER_ALL]
description: Calibrate T0 X+Y then measure T1 X — run SAVE_CONFIG once when done
gcode:
  CALIBRATE_SHAPER_T0
  CALIBRATE_SHAPER_T1

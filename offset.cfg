#####################################################################
# Tool Offset Calibration — offset.cfg
#
# Uses the klipper-toolchanger "tools_calibrate" Klipper extra by
# Viesturs Zariņš:  https://github.com/viesturz/klipper-toolchanger
#
# Hardware:  Ball-stud contact switch on mainboard pin PC15.
#            The nozzle presses the ball sideways — no toolhead
#            sensor required.
#
# Method:    [tools_calibrate] probes the ball from 4 lateral
#            directions at a controlled Z depth and bisects the
#            trigger pairs to find the exact XY centre.  A vertical
#            probe follows for Z.  This is far more accurate than
#            top-down parabolic estimation.
#
# INSTALL (run once on the host over SSH):
#   wget -O - https://raw.githubusercontent.com/viesturz/klipper-toolchanger/main/install.sh | bash
#   Then add to moonraker.conf (see repo README for update_manager entry).
#
# FIRST-TIME SETUP:
#   1. Set calp_x / calp_y in _OFFSET_VARS to the ball's approx XY location.
#   2. Home:                G28
#   3. Run:                 CALIBRATE_TOOL_OFFSET
#      Offsets are printed to console, saved, and applied immediately.
#   4. Re-run any time a toolhead or nozzle is changed.
#
# PIN NOTE:
#   The switch is a microswitch (normally-open).  ^!mcu:PC15 enables
#   the MCU pull-up and inverts so Klipper sees it as active-low.
#   If probing triggers immediately without contact, change to ^mcu:PC15.
#####################################################################

#--------------------------------------------------------------------
# klipper-toolchanger extra — lateral ball probe
#--------------------------------------------------------------------

[tools_calibrate]
pin:                  ^!mcu:PC15
travel_speed:         10       # mm/s — speed moving between probe positions
spread:               3.5      # mm — lateral distance from centre for XY probing
                               # use 3.5–4.0 for a ~5 mm diameter ball
lower_z:              0.5      # mm — how far below ball top to probe at
speed:                2        # mm/s — probing touch speed
lift_speed:           6        # mm/s — retract speed
final_lift_z:         4        # mm — Z raise after all probing
sample_retract_dist:  2        # mm — retract between samples
samples_tolerance:    0.05     # mm — max spread between samples
samples:              3
samples_result:       median

#--------------------------------------------------------------------
# Persistent variable storage
#--------------------------------------------------------------------

[save_variables]
filename: ~/printer_data/config/tool_offsets.cfg

#####################################################################
# Position config
# Set calp_x / calp_y to the ball's approximate location.
# The probe will find the exact centre within ~2 mm automatically.
#####################################################################

[gcode_macro _OFFSET_VARS]
variable_calp_x:  50.0    # Approximate X of ball centre (mm) — UPDATE ME
variable_calp_y:  10.0    # Approximate Y of ball centre (mm) — UPDATE ME
variable_calp_z:  20.0    # Safe Z travel height above ball (mm)
gcode:  # variable holder

#####################################################################
# Move active toolhead approximately over the probe
#####################################################################

[gcode_macro _CALIBRATE_MOVE_OVER_PROBE]
description: Move nozzle to approximate position above the calibration ball
gcode:
  {% set v = printer["gcode_macro _OFFSET_VARS"] %}
  BED_MESH_CLEAR
  G90
  G0 Z{v.calp_z} F2000
  G0 X{v.calp_x} Y{v.calp_y} F8000

#####################################################################
# Save and apply the measured T1 offsets
#####################################################################

[gcode_macro _SAVE_T1_OFFSET]
description: Save tools_calibrate results to persistent storage and apply
gcode:
  {% set x_off = printer.tools_calibrate.last_x_result | float %}
  {% set y_off = printer.tools_calibrate.last_y_result | float %}
  {% set z_off = printer.tools_calibrate.last_z_result | float %}
  RESPOND TYPE=echo MSG="========================================="
  RESPOND TYPE=echo MSG="  T1 Offsets from T0"
  RESPOND TYPE=echo MSG="  X : {x_off | round(4)} mm"
  RESPOND TYPE=echo MSG="  Y : {y_off | round(4)} mm"
  RESPOND TYPE=echo MSG="  Z : {z_off | round(4)} mm"
  RESPOND TYPE=echo MSG="========================================="
  SAVE_VARIABLE VARIABLE=t1_x_offset VALUE={x_off}
  SAVE_VARIABLE VARIABLE=t1_y_offset VALUE={y_off}
  SAVE_VARIABLE VARIABLE=t1_z_offset VALUE={z_off}
  T0
  SET_GCODE_OFFSET X=0 Y=0 Z=0
  T1
  SET_GCODE_OFFSET X={x_off} Y={y_off} Z={z_off} MOVE=1
  T0
  RESPOND TYPE=echo MSG="T1 offsets saved and applied."

#####################################################################
# Public macros
#####################################################################

[gcode_macro CALIBRATE_TOOL_OFFSET]
description: Full T0→T1 XYZ offset calibration using ball probe on PC15
gcode:
  {% set do_home = params.HOME | default('1') | int %}
  {% if do_home %}
    G28
  {% endif %}
  RESPOND TYPE=echo MSG="=== Tool offset calibration start ==="
  # ---- T0: establish reference position ----
  M117 Offset cal: T0 locate sensor...
  T0
  _CALIBRATE_MOVE_OVER_PROBE
  TOOL_LOCATE_SENSOR
  # ---- T1: measure offset from T0 ----
  M117 Offset cal: T1 measure offset...
  T1
  _CALIBRATE_MOVE_OVER_PROBE
  TOOL_CALIBRATE_TOOL_OFFSET
  # ---- Save & apply ----
  _SAVE_T1_OFFSET
  T0
  M117 Tool offset calibration complete

[gcode_macro APPLY_TOOL_OFFSET]
description: Load saved T1 offsets and apply — call this at startup
gcode:
  {% set svv = printer.save_variables.variables %}
  {% if svv.t1_x_offset is defined %}
    {% set x_off = svv.t1_x_offset | float %}
    {% set y_off = svv.t1_y_offset | float %}
    {% set z_off = svv.t1_z_offset | float %}
    RESPOND TYPE=echo MSG="Loaded T1 offsets — X:{x_off} Y:{y_off} Z:{z_off}"
  {% else %}
    {% set x_off = 0.0 %}
    {% set y_off = 0.0 %}
    {% set z_off = 0.0 %}
    RESPOND TYPE=echo MSG="WARNING: No saved T1 offsets found. Run CALIBRATE_TOOL_OFFSET."
  {% endif %}
  T0
  SET_GCODE_OFFSET X=0 Y=0 Z=0
  T1
  SET_GCODE_OFFSET X={x_off} Y={y_off} Z={z_off}
  T0

# ---- All old parabolic-scan macros removed ----
# _PROBE_SAVE, _PROBE_SAVE_T0_Z, _PROBE_SAVE_T1_Z, _COMPUTE_X_CENTER,
# _COMPUTE_Y_CENTER, _FIND_X_CENTER, _FIND_Y_CENTER_T0/T1, _PROBE_Z_T0/T1,
# _APPLY_AND_SAVE_OFFSETS are all superseded by [tools_calibrate].

# Save last probe Z directly to t0_z (called after final Z probe for T0)
[gcode_macro _PROBE_SAVE_T0_Z]
gcode:
  SET_GCODE_VARIABLE MACRO=_OFFSET_VARS VARIABLE=t0_z VALUE={printer.probe.last_z_result}
  RESPOND TYPE=echo MSG="T0 Z reference: {printer.probe.last_z_result|round(3)} mm"

# Save last probe Z directly to t1_z
[gcode_macro _PROBE_SAVE_T1_Z]
gcode:
  SET_GCODE_VARIABLE MACRO=_OFFSET_VARS VARIABLE=t1_z VALUE={printer.probe.last_z_result}
  RESPOND TYPE=echo MSG="T1 Z reference: {printer.probe.last_z_result|round(3)} mm"

# Parabolic interpolation on the three stored zl/zc/zr values → X centre
[gcode_macro _COMPUTE_X_CENTER]
gcode:
  {% set v     = printer["gcode_macro _OFFSET_VARS"] %}
  {% set d     = v.scan_step | float %}
  {% set zl    = v.zl | float %}
  {% set zc    = v.zc | float %}
  {% set zr    = v.zr | float %}
  {% set denom = (2.0 * zc - zl - zr) %}
  {% if denom > 0.0005 %}
    {% set cx = v.probe_x + d * (zr - zl) / denom %}
  {% else %}
    {% set cx = v.probe_x %}
    RESPOND TYPE=echo MSG="WARNING: X scan denominator near zero — using nominal X. Re-centre probe_x or increase scan_step."
  {% endif %}
  SET_GCODE_VARIABLE MACRO=_OFFSET_VARS VARIABLE={params.SAVE_TO} VALUE={cx}
  RESPOND TYPE=echo MSG="X centre ({params.SAVE_TO}): {cx|round(3)} mm"

# Parabolic interpolation → Y centre
[gcode_macro _COMPUTE_Y_CENTER]
gcode:
  {% set v     = printer["gcode_macro _OFFSET_VARS"] %}
  {% set d     = v.scan_step | float %}
  {% set zl    = v.zl | float %}
  {% set zc    = v.zc | float %}
  {% set zr    = v.zr | float %}
  {% set denom = (2.0 * zc - zl - zr) %}
  {% if denom > 0.0005 %}
    {% set cy = v.probe_y + d * (zr - zl) / denom %}
  {% else %}
    {% set cy = v.probe_y %}
    RESPOND TYPE=echo MSG="WARNING: Y scan denominator near zero — using nominal Y."
  {% endif %}
  SET_GCODE_VARIABLE MACRO=_OFFSET_VARS VARIABLE={params.SAVE_TO} VALUE={cy}
  RESPOND TYPE=echo MSG="Y centre ({params.SAVE_TO}): {cy|round(3)} mm"

#####################################################################
# Axis-scan helpers
# Each probes three positions and calls the interpolation helper.
# _FIND_Y_CENTER_T0 / _T1 use the already-found X centre so the Y
# scan is correctly centred in X.
#####################################################################

[gcode_macro _FIND_X_CENTER]
# Scan X at nominal probe_y.  SAVE_TO = t0_x or t1_x.
gcode:
  {% set v  = printer["gcode_macro _OFFSET_VARS"] %}
  {% set px = v.probe_x %}
  {% set py = v.probe_y %}
  {% set zh = v.probe_z_hop %}
  {% set sc = v.scan_step %}
  G90
  G1 Z{zh} F900
  G1 X{px - sc} Y{py} F3000
  PROBE
  _PROBE_SAVE VAR=zl
  G1 Z{zh} F900
  G1 X{px} Y{py} F3000
  PROBE
  _PROBE_SAVE VAR=zc
  G1 Z{zh} F900
  G1 X{px + sc} Y{py} F3000
  PROBE
  _PROBE_SAVE VAR=zr
  G1 Z{zh} F900
  _COMPUTE_X_CENTER SAVE_TO={params.SAVE_TO}

[gcode_macro _FIND_Y_CENTER_T0]
# Scan Y at the already-found T0 X centre.
gcode:
  {% set v  = printer["gcode_macro _OFFSET_VARS"] %}
  {% set px = v.t0_x %}          # use refined X, not nominal
  {% set py = v.probe_y %}
  {% set zh = v.probe_z_hop %}
  {% set sc = v.scan_step %}
  G90
  G1 Z{zh} F900
  G1 X{px} Y{py - sc} F3000
  PROBE
  _PROBE_SAVE VAR=zl
  G1 Z{zh} F900
  G1 X{px} Y{py} F3000
  PROBE
  _PROBE_SAVE VAR=zc
  G1 Z{zh} F900
  G1 X{px} Y{py + sc} F3000
  PROBE
  _PROBE_SAVE VAR=zr
  G1 Z{zh} F900
  _COMPUTE_Y_CENTER SAVE_TO=t0_y

[gcode_macro _FIND_Y_CENTER_T1]
# Scan Y at the already-found T1 X centre.
gcode:
  {% set v  = printer["gcode_macro _OFFSET_VARS"] %}
  {% set px = v.t1_x %}          # use refined X, not nominal
  {% set py = v.probe_y %}
  {% set zh = v.probe_z_hop %}
  {% set sc = v.scan_step %}
  G90
  G1 Z{zh} F900
  G1 X{px} Y{py - sc} F3000
  PROBE
  _PROBE_SAVE VAR=zl
  G1 Z{zh} F900
  G1 X{px} Y{py} F3000
  PROBE
  _PROBE_SAVE VAR=zc
  G1 Z{zh} F900
  G1 X{px} Y{py + sc} F3000
  PROBE
  _PROBE_SAVE VAR=zr
  G1 Z{zh} F900
  _COMPUTE_Y_CENTER SAVE_TO=t1_y

[gcode_macro _PROBE_Z_T0]
# Z probe at T0's found XY centre.
gcode:
  {% set v = printer["gcode_macro _OFFSET_VARS"] %}
  G90
  G1 Z{v.probe_z_hop} F900
  G1 X{v.t0_x} Y{v.t0_y} F3000
  PROBE
  _PROBE_SAVE_T0_Z
  G1 Z{v.probe_z_hop} F900

[gcode_macro _PROBE_Z_T1]
# Z probe at T1's found XY centre.
gcode:
  {% set v = printer["gcode_macro _OFFSET_VARS"] %}
  G90
  G1 Z{v.probe_z_hop} F900
  G1 X{v.t1_x} Y{v.t1_y} F3000
  PROBE
  _PROBE_SAVE_T1_Z
  G1 Z{v.probe_z_hop} F900

#####################################################################
# Compute, display, save, and apply offsets
#####################################################################

[gcode_macro _APPLY_AND_SAVE_OFFSETS]
gcode:
  {% set v     = printer["gcode_macro _OFFSET_VARS"] %}
  {% set x_off = v.t0_x - v.t1_x %}
  {% set y_off = v.t0_y - v.t1_y %}
  {% set z_off = v.t0_z - v.t1_z %}
  RESPOND TYPE=echo MSG="========================================="
  RESPOND TYPE=echo MSG="  T1 Offsets from T0"
  RESPOND TYPE=echo MSG="  X : {x_off|round(4)} mm"
  RESPOND TYPE=echo MSG="  Y : {y_off|round(4)} mm"
  RESPOND TYPE=echo MSG="  Z : {z_off|round(4)} mm"
  RESPOND TYPE=echo MSG="========================================="
  SAVE_VARIABLE VARIABLE=t1_x_offset VALUE={x_off}
  SAVE_VARIABLE VARIABLE=t1_y_offset VALUE={y_off}
  SAVE_VARIABLE VARIABLE=t1_z_offset VALUE={z_off}
  # Apply to the current session immediately
  T0
  SET_GCODE_OFFSET X=0 Y=0 Z=0
  T1
  SET_GCODE_OFFSET X={x_off} Y={y_off} Z={z_off}
  T0
  RESPOND TYPE=echo MSG="Offsets saved to tool_offsets.cfg and applied."

#####################################################################
# Public macros
#####################################################################

[gcode_macro CALIBRATE_TOOL_OFFSET]
description: Calibrate T1 XYZ offset relative to T0 using ball probe on PC15
gcode:
  {% set do_home = params.HOME | default('1') | int %}
  {% if do_home %}
    G28
  {% endif %}
  RESPOND TYPE=echo MSG="=== Tool offset calibration starting ==="
  # ---- T0 reference ----
  M117 Offset cal: T0 X scan...
  T0
  _FIND_X_CENTER SAVE_TO=t0_x
  M117 Offset cal: T0 Y scan...
  _FIND_Y_CENTER_T0
  M117 Offset cal: T0 Z probe...
  _PROBE_Z_T0
  # ---- T1 measurement ----
  M117 Offset cal: T1 X scan...
  T1
  _FIND_X_CENTER SAVE_TO=t1_x
  M117 Offset cal: T1 Y scan...
  _FIND_Y_CENTER_T1
  M117 Offset cal: T1 Z probe...
  _PROBE_Z_T1
  # ---- Compute & save ----
  _APPLY_AND_SAVE_OFFSETS
  M117 Tool offset calibration complete

[gcode_macro APPLY_TOOL_OFFSET]
description: Read saved T1 offsets from tool_offsets.cfg and apply (run at startup)
gcode:
  {% set svv = printer.save_variables.variables %}
  {% if svv.t1_x_offset is defined %}
    {% set x_off = svv.t1_x_offset | float %}
    {% set y_off = svv.t1_y_offset | float %}
    {% set z_off = svv.t1_z_offset | float %}
    RESPOND TYPE=echo MSG="Loaded T1 offsets — X:{x_off} Y:{y_off} Z:{z_off}"
  {% else %}
    {% set x_off = 0.0 %}
    {% set y_off = 0.0 %}
    {% set z_off = 0.0 %}
    RESPOND TYPE=echo MSG="No saved T1 offsets found — run CALIBRATE_TOOL_OFFSET."
  {% endif %}
  # Store into _OFFSET_VARS so T1 macro can read them at tool-change time
  SET_GCODE_VARIABLE MACRO=_OFFSET_VARS VARIABLE=t1_x VALUE={x_off}
  SET_GCODE_VARIABLE MACRO=_OFFSET_VARS VARIABLE=t1_y VALUE={y_off}
  SET_GCODE_VARIABLE MACRO=_OFFSET_VARS VARIABLE=t1_z VALUE={z_off}

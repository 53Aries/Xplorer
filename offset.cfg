#####################################################################
# Tool Offset Calibration — offset.cfg
#
# Uses the klipper-toolchanger "tools_calibrate" Klipper extra by
# Viesturs Zariņš:  https://github.com/viesturz/klipper-toolchanger
#
# Hardware:  Ball-stud contact switch on mainboard pin PC15.
#            The nozzle presses the ball sideways — no toolhead
#            sensor required.
#
# Method:    [tools_calibrate] probes the ball from 4 lateral
#            directions at a controlled Z depth and bisects the
#            trigger pairs to find the exact XY centre.  A vertical
#            probe follows for Z.  This is far more accurate than
#            top-down parabolic estimation.
#
# INSTALL (run once on the host over SSH):
#   wget -O - https://raw.githubusercontent.com/viesturz/klipper-toolchanger/main/install.sh | bash
#   Then add to moonraker.conf (see repo README for update_manager entry).
#
# FIRST-TIME SETUP:
#   1. Set calp_x / calp_y in _OFFSET_VARS to the ball's approx XY location.
#   2. Home:                G28
#   3. Run:                 CALIBRATE_TOOL_OFFSET
#      Offsets are printed to console, saved, and applied immediately.
#   4. Re-run any time a toolhead or nozzle is changed.
#
# PIN NOTE:
#   The switch is a microswitch (normally-open).  ^!mcu:PC15 enables
#   the MCU pull-up and inverts so Klipper sees it as active-low.
#   If probing triggers immediately without contact, change to ^mcu:PC15.
#####################################################################

#--------------------------------------------------------------------
# klipper-toolchanger extra — lateral ball probe
#--------------------------------------------------------------------

[tools_calibrate]
pin:                  ^!mcu:PC15
travel_speed:         10       # mm/s — speed moving between probe positions
spread:               3.5      # mm — lateral distance from centre for XY probing
                               # use 3.5–4.0 for a ~5 mm diameter ball
lower_z:              0.5      # mm — how far below ball top to probe at
speed:                2        # mm/s — probing touch speed
lift_speed:           6        # mm/s — retract speed
final_lift_z:         4        # mm — Z raise after all probing
sample_retract_dist:  2        # mm — retract between samples
samples_tolerance:    0.05     # mm — max spread between samples
samples:              3
samples_result:       median

#--------------------------------------------------------------------
# Persistent variable storage
#--------------------------------------------------------------------

[save_variables]
filename: ~/printer_data/config/tool_offsets.cfg

#####################################################################
# Position config
# Set calp_x / calp_y to the ball's approximate location.
# The probe will find the exact centre within ~2 mm automatically.
#####################################################################

[gcode_macro _OFFSET_VARS]
variable_calp_x:  50.0    # Approximate X of ball centre (mm) — UPDATE ME
variable_calp_y:  10.0    # Approximate Y of ball centre (mm) — UPDATE ME
variable_calp_z:  20.0    # Safe Z travel height above ball (mm)
gcode:  # variable holder

#####################################################################
# Move active toolhead approximately over the probe
#####################################################################

[gcode_macro _CALIBRATE_MOVE_OVER_PROBE]
description: Move nozzle to approximate position above the calibration ball
gcode:
  {% set v = printer["gcode_macro _OFFSET_VARS"] %}
  BED_MESH_CLEAR
  G90
  G0 Z{v.calp_z} F2000
  G0 X{v.calp_x} Y{v.calp_y} F8000

#####################################################################
# Save and apply the measured T1 offsets
#####################################################################

[gcode_macro _SAVE_T1_OFFSET]
description: Save tools_calibrate results to persistent storage and apply
gcode:
  {% set x_off = printer.tools_calibrate.last_x_result | float %}
  {% set y_off = printer.tools_calibrate.last_y_result | float %}
  {% set z_off = printer.tools_calibrate.last_z_result | float %}
  RESPOND TYPE=echo MSG="========================================="
  RESPOND TYPE=echo MSG="  T1 Offsets from T0"
  RESPOND TYPE=echo MSG="  X : {x_off | round(4)} mm"
  RESPOND TYPE=echo MSG="  Y : {y_off | round(4)} mm"
  RESPOND TYPE=echo MSG="  Z : {z_off | round(4)} mm"
  RESPOND TYPE=echo MSG="========================================="
  SAVE_VARIABLE VARIABLE=t1_x_offset VALUE={x_off}
  SAVE_VARIABLE VARIABLE=t1_y_offset VALUE={y_off}
  SAVE_VARIABLE VARIABLE=t1_z_offset VALUE={z_off}
  T0
  SET_GCODE_OFFSET X=0 Y=0 Z=0
  T1
  SET_GCODE_OFFSET X={x_off} Y={y_off} Z={z_off} MOVE=1
  T0
  RESPOND TYPE=echo MSG="T1 offsets saved and applied."

#####################################################################
# Public macros
#####################################################################

[gcode_macro CALIBRATE_TOOL_OFFSET]
description: Full T0→T1 XYZ offset calibration using ball probe on PC15
gcode:
  {% set do_home = params.HOME | default('1') | int %}
  {% if do_home %}
    G28
  {% endif %}
  RESPOND TYPE=echo MSG="=== Tool offset calibration start ==="
  # ---- T0: establish reference position ----
  M117 Offset cal: T0 locate sensor...
  T0
  _CALIBRATE_MOVE_OVER_PROBE
  TOOL_LOCATE_SENSOR
  # ---- T1: measure offset from T0 ----
  M117 Offset cal: T1 measure offset...
  T1
  _CALIBRATE_MOVE_OVER_PROBE
  TOOL_CALIBRATE_TOOL_OFFSET
  # ---- Save & apply ----
  _SAVE_T1_OFFSET
  T0
  M117 Tool offset calibration complete

[gcode_macro APPLY_TOOL_OFFSET]
description: Load saved T1 offsets and apply — call this at startup
gcode:
  {% set svv = printer.save_variables.variables %}
  {% if svv.t1_x_offset is defined %}
    {% set x_off = svv.t1_x_offset | float %}
    {% set y_off = svv.t1_y_offset | float %}
    {% set z_off = svv.t1_z_offset | float %}
    RESPOND TYPE=echo MSG="Loaded T1 offsets — X:{x_off} Y:{y_off} Z:{z_off}"
  {% else %}
    {% set x_off = 0.0 %}
    {% set y_off = 0.0 %}
    {% set z_off = 0.0 %}
    RESPOND TYPE=echo MSG="WARNING: No saved T1 offsets found. Run CALIBRATE_TOOL_OFFSET."
  {% endif %}
  T0
  SET_GCODE_OFFSET X=0 Y=0 Z=0
  T1
  SET_GCODE_OFFSET X={x_off} Y={y_off} Z={z_off}
  T0



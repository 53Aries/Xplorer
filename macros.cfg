#####################################################################
# macros.cfg — General printer macros
# IDEX-specific: fan routing, tool changes, print start/end,
# copy & mirror modes, nozzle brushing.
#####################################################################

#####################################################################
# Nozzle Brush
#
# Two silicone/wire brushes mounted at the rear of the print bed.
# T0 brush: X94–129, Y≈405  (rear-left,  matches FORMBOT Xplorer)
# T1 brush: X294–329, Y≈405  (rear-right, matches FORMBOT Xplorer)
#
# brush_z: Z height (machine coords) where nozzle skims bristles.
#   After first CARTOGRAPHER_TOUCH, jog nozzle until it just touches
#   the bristles and record that Z value here.
#   Typical starting value: 2.0 – 3.0 mm.
#####################################################################

[gcode_macro BRUSH_VARS]
variable_t0_brush_x_start:  94     # T0 brush left X edge
variable_t0_brush_y:       405     # T0 brush centre Y
variable_t1_brush_x_start: 294     # T1 brush left X edge
variable_t1_brush_y:       405     # T1 brush centre Y
variable_brush_width:       35     # Brush span in X (mm) — X+35 = right edge
variable_brush_depth:        6     # Y swept ±(depth/2) around centre
variable_brush_z:            2.0   # Z during wiping (machine coords) — TUNE THIS
variable_approach_speed:  9000     # Speed to move to brush (mm/min)
variable_wipe_speed:      15000    # Speed during wipe passes (mm/min)
variable_wipe_count:          4    # Back-and-forth wipe cycles
variable_brush_temp_offset:  20    # °C below last print temp to target during brush
variable_brush_default_temp: 180   # fallback brush temp when no print has run yet
variable_brush_min_temp:     150   # if nozzle already at/above this, skip reheating
gcode:  # variable holder

[gcode_macro BRUSH_T0]
description: Heat T0 to brush temp if needed, wipe nozzle, restore heater target
gcode:
  {% set b         = printer['gcode_macro BRUSH_VARS'] %}
  {% set svv        = printer.save_variables.variables %}
  {% set x0         = b.t0_brush_x_start | float %}
  {% set x1         = x0 + b.brush_width %}
  {% set y_ctr      = b.t0_brush_y | float %}
  {% set y_hi       = y_ctr + b.brush_depth / 2 %}
  {% set y_lo       = y_ctr - b.brush_depth / 2 %}
  # Determine brush temperature: last print temp minus offset, floored at brush_min_temp
  {% set last_temp  = svv.t0_last_print_temp | default(b.brush_default_temp) | float %}
  {% set brush_temp = [last_temp - b.brush_temp_offset, b.brush_min_temp] | max | int %}
  {% set prev_target = printer.extruder.target | float %}
  {% set needs_heat  = prev_target < b.brush_min_temp %}
  SAVE_GCODE_STATE NAME=brush_t0_state
  # Ensure T0 is active
  SET_DUAL_CARRIAGE CARRIAGE=0
  ACTIVATE_EXTRUDER EXTRUDER=extruder
  # Heat nozzle to brush temp if currently too cold
  {% if needs_heat %}
    RESPOND TYPE=echo MSG="BRUSH_T0: heating to {brush_temp}°C before wipe"
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET={brush_temp}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={brush_temp}
  {% endif %}
  G90
  # Lift to safe Z, then approach brush
  G1 Z10 F3000
  G1 X{x0} Y{y_ctr} F{b.approach_speed}
  # Descend to bristle contact height
  G1 Z{b.brush_z} F600
  # Phase 1 — diagonal weave passes
  {% for i in range(b.wipe_count) %}
    {% if i % 2 == 0 %}
      G1 X{x1} Y{y_hi} F{b.wipe_speed}
      G1 X{x0} Y{y_lo} F{b.wipe_speed}
    {% else %}
      G1 X{x1} Y{y_lo} F{b.wipe_speed}
      G1 X{x0} Y{y_hi} F{b.wipe_speed}
    {% endif %}
  {% endfor %}
  # Phase 2 — two clockwise circles centred in the brush
  {% set x_ctr = x0 + b.brush_width / 2 %}
  {% set radius = b.brush_depth / 2 %}
  G1 X{x_ctr - radius} Y{y_ctr} F{b.approach_speed}
  G2 I{radius} J0 F{b.wipe_speed}
  G2 I{radius} J0 F{b.wipe_speed}
  # Phase 3 — final diagonal sweep to clear nozzle tip
  G1 X{x0} Y{y_lo} F{b.wipe_speed}
  G1 X{x1} Y{y_hi} F{b.wipe_speed}
  G1 X{x0} Y{y_ctr} F{b.wipe_speed}
  # Lift clear of brush
  G1 Z10 F3000
  # Restore heater to its previous target (e.g. 0 if printer was cold)
  {% if needs_heat %}
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET={prev_target | int}
  {% endif %}
  RESTORE_GCODE_STATE NAME=brush_t0_state MOVE=0

[gcode_macro BRUSH_T1]
description: Heat T1 to brush temp if needed, wipe nozzle, restore heater target
gcode:
  {% set b          = printer['gcode_macro BRUSH_VARS'] %}
  {% set svv         = printer.save_variables.variables %}
  {% set x0          = b.t1_brush_x_start | float %}
  {% set x1          = x0 + b.brush_width %}
  {% set y_ctr       = b.t1_brush_y | float %}
  {% set y_hi        = y_ctr + b.brush_depth / 2 %}
  {% set y_lo        = y_ctr - b.brush_depth / 2 %}
  # Determine brush temperature: last print temp minus offset, floored at brush_min_temp
  {% set last_temp   = svv.t1_last_print_temp | default(b.brush_default_temp) | float %}
  {% set brush_temp  = [last_temp - b.brush_temp_offset, b.brush_min_temp] | max | int %}
  {% set prev_target = printer.extruder1.target | float %}
  {% set needs_heat  = prev_target < b.brush_min_temp %}
  SAVE_GCODE_STATE NAME=brush_t1_state
  # Activate T1
  SET_DUAL_CARRIAGE CARRIAGE=1
  ACTIVATE_EXTRUDER EXTRUDER=extruder1
  # Heat nozzle to brush temp if currently too cold
  {% if needs_heat %}
    RESPOND TYPE=echo MSG="BRUSH_T1: heating to {brush_temp}°C before wipe"
    SET_HEATER_TEMPERATURE HEATER=extruder1 TARGET={brush_temp}
    TEMPERATURE_WAIT SENSOR=extruder1 MINIMUM={brush_temp}
  {% endif %}
  G90
  G1 Z10 F3000
  G1 X{x1} Y{y_ctr} F{b.approach_speed}   # approach from right for T1
  G1 Z{b.brush_z} F600
  # Phase 1 — diagonal weave passes
  {% for i in range(b.wipe_count) %}
    {% if i % 2 == 0 %}
      G1 X{x0} Y{y_hi} F{b.wipe_speed}
      G1 X{x1} Y{y_lo} F{b.wipe_speed}
    {% else %}
      G1 X{x0} Y{y_lo} F{b.wipe_speed}
      G1 X{x1} Y{y_hi} F{b.wipe_speed}
    {% endif %}
  {% endfor %}
  # Phase 2 — two clockwise circles centred in the brush
  {% set x_ctr = x0 + b.brush_width / 2 %}
  {% set radius = b.brush_depth / 2 %}
  G1 X{x_ctr - radius} Y{y_ctr} F{b.approach_speed}
  G2 I{radius} J0 F{b.wipe_speed}
  G2 I{radius} J0 F{b.wipe_speed}
  # Phase 3 — final diagonal sweep to clear nozzle tip
  G1 X{x1} Y{y_lo} F{b.wipe_speed}
  G1 X{x0} Y{y_hi} F{b.wipe_speed}
  G1 X{x1} Y{y_ctr} F{b.wipe_speed}
  G1 Z10 F3000
  # Restore heater to its previous target
  {% if needs_heat %}
    SET_HEATER_TEMPERATURE HEATER=extruder1 TARGET={prev_target | int}
  {% endif %}
  RESTORE_GCODE_STATE NAME=brush_t1_state MOVE=0

#####################################################################
# M106 / M107 Fan Routing
# Routes slicer fan commands to the active toolhead's part cooling fan
#####################################################################

[gcode_macro M106]
description: Set part cooling fan speed for active toolhead
gcode:
  {% set speed = (params.S | default(255)) | int %}
  {% set pct = (speed / 255.0) %}
  {% if printer.toolhead.extruder == "extruder" %}
    SET_FAN_SPEED FAN=fan_t0 SPEED={pct}
  {% else %}
    SET_FAN_SPEED FAN=fan_t1 SPEED={pct}
  {% endif %}

[gcode_macro M107]
description: Turn off part cooling fan for active toolhead
gcode:
  {% if printer.toolhead.extruder == "extruder" %}
    SET_FAN_SPEED FAN=fan_t0 SPEED=0
  {% else %}
    SET_FAN_SPEED FAN=fan_t1 SPEED=0
  {% endif %}

#####################################################################
# Tool Change Macros
#####################################################################

# Park positions — adjust to your physical X limits
[gcode_macro _TOOLCHANGE_VARS]
variable_t0_park_x:       0    # T0 parks at its left endstop  (position_endstop=0)
variable_t1_park_x:     421    # T1 parks at its right endstop (position_endstop=421) — per FORMBOT
variable_park_speed:    18000   # mm/min travel speed for park move
variable_standby_offset:   50   # °C to drop when parked
variable_z_drop_mm:       5.0   # mm to drop Z before park move
variable_t0_print_temp:     0   # set by PRINT_START from slicer param
variable_t1_print_temp:     0   # set by PRINT_START from slicer param
gcode:  # variable holder

[gcode_macro T0]
description: Park T1 at standby temp, activate T0, restore Z and T0 temp
gcode:
  {% set v          = printer["gcode_macro _TOOLCHANGE_VARS"] %}
  {% set t0_restore = v.t0_print_temp | float %}
  {% set homed      = 'z' in printer.toolhead.homed_axes %}
  {% set saved_z    = printer.toolhead.position.z if homed else 0 %}
  {% if printer.toolhead.extruder == "extruder1" %}
    SAVE_GCODE_STATE NAME=toolchange_state
    {% if homed %}
      G91
      G1 Z{v.z_drop_mm} F900
      G90
    {% endif %}
    # Drop T1 to standby
    {% set t1_standby = [v.t1_print_temp | float - v.standby_offset, 0] | max %}
    {% if v.t1_print_temp > 0 %}
      SET_HEATER_TEMPERATURE HEATER=extruder1 TARGET={t1_standby}
    {% endif %}
    # Park T1
    SET_DUAL_CARRIAGE CARRIAGE=1
    G0 X{v.t1_park_x} F{v.park_speed}
    RESTORE_GCODE_STATE NAME=toolchange_state MOVE=0
  {% endif %}
  ACTIVATE_EXTRUDER EXTRUDER=extruder
  SET_DUAL_CARRIAGE CARRIAGE=0
  SET_GCODE_OFFSET X=0 Y=0 Z=0 MOVE=0
  # Wait for T0 to reach print temp while still parked
  {% if t0_restore > 0 %}
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET={t0_restore}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={t0_restore}
  {% endif %}
  # Now restore Z and return to print position
  {% if homed %}
    G90
    G1 Z{saved_z} F900
  {% endif %}

[gcode_macro T1]
description: Park T0 at standby temp, activate T1, restore Z and T1 temp
gcode:
  {% set v          = printer["gcode_macro _TOOLCHANGE_VARS"] %}
  {% set svv        = printer.save_variables.variables %}
  {% set x_off      = svv.t1_x_offset | default(0) | float %}
  {% set y_off      = svv.t1_y_offset | default(0) | float %}
  {% set z_off      = svv.t1_z_offset | default(0) | float %}
  {% set t1_restore = v.t1_print_temp | float %}
  {% set homed      = 'z' in printer.toolhead.homed_axes %}
  {% set saved_z    = printer.toolhead.position.z if homed else 0 %}
  {% if printer.toolhead.extruder == "extruder" %}
    SAVE_GCODE_STATE NAME=toolchange_state
    {% if homed %}
      G91
      G1 Z{v.z_drop_mm} F900
      G90
    {% endif %}
    # Drop T0 to standby
    {% set t0_standby = [v.t0_print_temp | float - v.standby_offset, 0] | max %}
    {% if v.t0_print_temp > 0 %}
      SET_HEATER_TEMPERATURE HEATER=extruder TARGET={t0_standby}
    {% endif %}
    # Park T0
    SET_DUAL_CARRIAGE CARRIAGE=0
    G0 X{v.t0_park_x} F{v.park_speed}
    RESTORE_GCODE_STATE NAME=toolchange_state MOVE=0
  {% endif %}
  ACTIVATE_EXTRUDER EXTRUDER=extruder1
  SET_DUAL_CARRIAGE CARRIAGE=1
  SET_GCODE_OFFSET X={x_off} Y={y_off} Z={z_off} MOVE=0
  # Wait for T1 to reach print temp while still parked
  {% if t1_restore > 0 %}
    SET_HEATER_TEMPERATURE HEATER=extruder1 TARGET={t1_restore}
    TEMPERATURE_WAIT SENSOR=extruder1 MINIMUM={t1_restore}
  {% endif %}
  # Now restore Z and return to print position
  {% if homed %}
    G90
    G1 Z{saved_z} F900
  {% endif %}

#####################################################################
# Start / End Print Macros
# Customise to your slicer's start/end g-code calls
#####################################################################

[gcode_macro PRINT_START]
# OrcaSlicer machine start G-code:
#   PRINT_START BED={bed_temperature[0]} T0={nozzle_temperature[0]} T1={nozzle_temperature[1]} FIRST_TOOL={initial_tool}
# FIRST_TOOL=0 → T0 prints first; FIRST_TOOL=1 → T1 prints first.
# The first tool heats to full print temp; the other heats to standby only.
# The standby tool reaches full print temp automatically on the first tool change.
gcode:
  {% set BED_TEMP    = params.BED        | default(60) | float %}
  {% set T0_TEMP     = params.T0         | default(0)  | float %}
  {% set T1_TEMP     = params.T1         | default(0)  | float %}
  {% set FIRST_TOOL  = params.FIRST_TOOL | default(0)  | int %}
  {% set standby_off = printer["gcode_macro _TOOLCHANGE_VARS"].standby_offset | int %}
  # Store slicer temps so T0/T1 tool-change macros always restore correctly
  SET_GCODE_VARIABLE MACRO=_TOOLCHANGE_VARS VARIABLE=t0_print_temp VALUE={T0_TEMP}
  SET_GCODE_VARIABLE MACRO=_TOOLCHANGE_VARS VARIABLE=t1_print_temp VALUE={T1_TEMP}
  # Persist print temps so brush macros can heat to last-known-temp minus offset
  {% if T0_TEMP > 0 %}
    SAVE_VARIABLE VARIABLE=t0_last_print_temp VALUE={T0_TEMP}
  {% endif %}
  {% if T1_TEMP > 0 %}
    SAVE_VARIABLE VARIABLE=t1_last_print_temp VALUE={T1_TEMP}
  {% endif %}
  SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={BED_TEMP}
  TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={BED_TEMP}
  # Heat first tool to print temp, second tool to standby.
  # Both start now so the nozzle is warm enough for brushing during G28.
  {% if FIRST_TOOL == 0 %}
    {% if T0_TEMP > 0 %}
      SET_HEATER_TEMPERATURE HEATER=extruder TARGET={T0_TEMP}
    {% endif %}
    {% if T1_TEMP > 0 %}
      {% set t1_standby = [T1_TEMP - standby_off, 0] | max %}
      SET_HEATER_TEMPERATURE HEATER=extruder1 TARGET={t1_standby}
    {% endif %}
  {% else %}
    {% if T1_TEMP > 0 %}
      SET_HEATER_TEMPERATURE HEATER=extruder1 TARGET={T1_TEMP}
    {% endif %}
    {% if T0_TEMP > 0 %}
      {% set t0_standby = [T0_TEMP - standby_off, 0] | max %}
      SET_HEATER_TEMPERATURE HEATER=extruder TARGET={t0_standby}
    {% endif %}
  {% endif %}
  T0                                  # Cartographer is on T0 — must be active for homing
  G28                                 # Home all axes (Z → X → Y → BRUSH_T0 → CARTOGRAPHER_TOUCH)
  Z_TILT_ADJUST                       # Level gantry via Cartographer probe
  BED_MESH_CALIBRATE                  # Cartographer scan — T0 must remain active
  # Wait only for the first-used tool — the standby tool reaches print temp on first tool change
  {% if FIRST_TOOL == 0 %}
    {% if T0_TEMP > 0 %}
      TEMPERATURE_WAIT SENSOR=extruder MINIMUM={T0_TEMP}
    {% endif %}
  {% else %}
    {% if T1_TEMP > 0 %}
      TEMPERATURE_WAIT SENSOR=extruder1 MINIMUM={T1_TEMP}
    {% endif %}
  {% endif %}
  # Activate first tool (applies gcode offset; T1 macro also does final temp check)
  {% if FIRST_TOOL == 1 %}
    T1
  {% else %}
    T0
  {% endif %}

#####################################################################
# Filament Runout / Insert
#####################################################################

[gcode_macro FILAMENT_RUNOUT]
description: Called by filament sensor on runout — alerts and pauses if printing
gcode:
  {% set T = params.T | default(0) | int %}
  RESPOND TYPE=error MSG="Filament runout on T{T}!"
  {% if printer.print_stats.state == "printing" %}
    PAUSE
  {% endif %}

[gcode_macro FILAMENT_INSERT]
description: Called by filament sensor on insert — automatically loads filament
gcode:
  {% set T = params.T | default(0) | int %}
  RESPOND TYPE=echo MSG="Filament detected in T{T} — starting load"
  FILAMENT_LOAD T={T}

#####################################################################
# Filament Unload with Tip Forming
#
# Geometry (from your measurements):
#   Entry sensor → extruder gear : 36 mm
#   Extruder gear → nozzle tip   : 82 mm
#   Nozzle tip → cooling tube    : 26 mm  (melt zone length)
#   Cooling tube length          : 18 mm
#
# Tip-forming sequence (based on SuperSlicer / Happy-Hare method):
#   1. Ram   — pressure pulses build a clean blob at the tip
#   2. Retract — tapered pull drags tip into the cooling tube
#   3. Cool  — oscillate in cooling tube to solidify the tip shape
#   4. Skinnydip (optional) — brief re-dip burns off fine hairs
#   5. Unload — fast pull past the entry sensor
#
# Call:  FILAMENT_UNLOAD T=0   or   FILAMENT_UNLOAD T=1
#####################################################################

[gcode_macro FILAMENT_UNLOAD_VARS]
# ---- Hotend geometry (mm) ----
variable_sensor_to_gear:        36    # entry sensor → extruder gear
variable_gear_to_nozzle:        82    # extruder gear → nozzle tip
variable_melt_zone_length:      26    # nozzle tip → start of cooling tube
variable_cooling_tube_length:   18    # length of cooling tube in heatsink
# ---- Safe operating temperature ----
variable_safe_temp:            240    # °C — heat to this if nozzle is too cold
# ---- Ramming ----
variable_ramming_volume:        23    # mm³ to push before retracting (0 = skip)
# ---- Retraction speeds (mm/s) ----
variable_unloading_speed_start: 80    # initial fast retract
variable_unloading_speed:       20    # main tapered retract
# ---- Cooling moves ----
variable_initial_cooling_speed: 10    # mm/s at start of cooling oscillations
variable_final_cooling_speed:   40    # mm/s at end of cooling oscillations
variable_cooling_moves:          4    # number of in/out oscillation cycles
# ---- Skinnydip (burns fine PLA hairs — disable for PETG/ABS) ----
variable_use_skinnydip:          0    # 1 = enable, 0 = disable
variable_skinnydip_distance:    30    # mm to re-insert into melt zone
variable_dip_insertion_speed:   33    # mm/s insertion
variable_dip_extraction_speed:  70    # mm/s extraction
variable_melt_zone_pause:        0    # ms pause at bottom of dip
variable_cooling_zone_pause:  2000    # ms pause after extraction
# ---- Final unload ----
variable_unload_speed:          50    # mm/s for fast pull past sensor
variable_unload_safety_margin:  20    # mm extra travel beyond sensor
# ---- Load ----
variable_load_speed_fast:       50    # mm/s while feeding through cold zone
variable_load_speed_slow:       10    # mm/s once entering the melt zone
variable_load_slow_start:       15    # mm before nozzle tip to switch to slow
variable_purge_length:          30    # mm to purge after reaching nozzle
gcode:  # variable holder

[gcode_macro FILAMENT_UNLOAD]
description: Form tip then unload filament past entry sensor. T=0 or T=1 TEMP=240
gcode:
  {% set T           = params.T    | default(0)                                   | int %}
  {% set v           = printer['gcode_macro FILAMENT_UNLOAD_VARS'] %}
  {% set target_temp = params.TEMP | default(v.safe_temp)                         | int %}
  {% set heater      = 'extruder1' if T == 1 else 'extruder' %}
  {% set prev_target = printer[heater].target | float %}

  # Activate the requested toolhead
  {% if T == 1 %}
    SET_DUAL_CARRIAGE CARRIAGE=1
    ACTIVATE_EXTRUDER EXTRUDER=extruder1
  {% else %}
    SET_DUAL_CARRIAGE CARRIAGE=0
    ACTIVATE_EXTRUDER EXTRUDER=extruder
  {% endif %}

  # Heat to safe temp if nozzle is too cold to extrude
  {% if prev_target < target_temp %}
    RESPOND TYPE=echo MSG="T{T} unload: heating to {target_temp}°C"
    SET_HEATER_TEMPERATURE HEATER={heater} TARGET={target_temp}
    TEMPERATURE_WAIT SENSOR={heater} MINIMUM={target_temp}
  {% endif %}

  # Derived distances
  {% set cooling_tube_pos = v.gear_to_nozzle - v.melt_zone_length %}
  {% set total_unload     = v.gear_to_nozzle + v.sensor_to_gear + v.unload_safety_margin %}
  {% set final_pull       = total_unload - cooling_tube_pos %}

  SAVE_GCODE_STATE NAME=unload_state
  G91   # Relative positioning
  M83   # Relative extrusion
  G92 E0

  # ---- Step 1: Ramming ----
  {% if v.ramming_volume > 0 %}
    {% set r = v.ramming_volume / 23.0 %}
    G1 E{0.5784 * r} F299
    G1 E{0.5834 * r} F302
    G1 E{0.5918 * r} F306
    G1 E{0.6169 * r} F319
    G1 E{0.3393 * r} F350
    G1 E{0.3363 * r} F350
    G1 E{0.7577 * r} F392
    G1 E{0.8382 * r} F434
    G1 E{0.7776 * r} F469
    G1 E{0.1293 * r} F469
    G1 E{0.9673 * r} F501
    G1 E{1.0176 * r} F527
    G1 E{0.5956 * r} F544
    G1 E{0.4555 * r} F544
    G1 E{1.0662 * r} F552
  {% endif %}

  # ---- Step 2: Tapered retraction into cooling tube ----
  {% set tail = cooling_tube_pos - 15 %}
  G1 E-15 F{v.unloading_speed_start * 60}
  {% if tail > 0 %}
    G1 E-{(tail * 0.7) | round(2)} F{v.unloading_speed * 60}
    G1 E-{(tail * 0.2) | round(2)} F{(v.unloading_speed * 0.5 * 60) | int}
    G1 E-{(tail * 0.1) | round(2)} F{(v.unloading_speed * 0.3 * 60) | int}
  {% endif %}

  # ---- Step 3: Cooling moves ----
  {% set denom   = [2 * v.cooling_moves - 1, 1] | max %}
  {% set spd_inc = (v.final_cooling_speed - v.initial_cooling_speed) / denom %}
  {% for i in range(v.cooling_moves) %}
    {% set spd = v.initial_cooling_speed + spd_inc * i * 2 %}
    G1 E{ v.cooling_tube_length}  F{(spd * 60)             | int}
    G1 E-{v.cooling_tube_length}  F{((spd + spd_inc) * 60) | int}
  {% endfor %}

  # ---- Step 4: Skinnydip (optional) ----
  {% if v.use_skinnydip %}
    G1 E{ v.skinnydip_distance} F{v.dip_insertion_speed  * 60}
    G4 P{v.melt_zone_pause}
    G1 E-{v.skinnydip_distance} F{v.dip_extraction_speed * 60}
    G4 P{v.cooling_zone_pause}
  {% endif %}

  # ---- Step 5: Full unload past entry sensor ----
  G1 E-{final_pull | round(1)} F{v.unload_speed * 60}

  RESTORE_GCODE_STATE NAME=unload_state
  # Restore heater to its previous target
  SET_HEATER_TEMPERATURE HEATER={heater} TARGET={prev_target | int}
  RESPOND TYPE=echo MSG="T{T} unloaded"

[gcode_macro FILAMENT_LOAD]
description: Feed filament from sensor to nozzle and purge. T=0 or T=1 TEMP=240
gcode:
  {% set T           = params.T    | default(0)                                   | int %}
  {% set v           = printer['gcode_macro FILAMENT_UNLOAD_VARS'] %}
  {% set target_temp = params.TEMP | default(v.safe_temp)                         | int %}
  {% set heater      = 'extruder1' if T == 1 else 'extruder' %}
  {% set prev_target = printer[heater].target | float %}

  # Activate the requested toolhead
  {% if T == 1 %}
    SET_DUAL_CARRIAGE CARRIAGE=1
    ACTIVATE_EXTRUDER EXTRUDER=extruder1
  {% else %}
    SET_DUAL_CARRIAGE CARRIAGE=0
    ACTIVATE_EXTRUDER EXTRUDER=extruder
  {% endif %}

  # Heat to safe temp if nozzle is too cold to extrude
  {% if prev_target < target_temp %}
    RESPOND TYPE=echo MSG="T{T} load: heating to {target_temp}°C"
    SET_HEATER_TEMPERATURE HEATER={heater} TARGET={target_temp}
    TEMPERATURE_WAIT SENSOR={heater} MINIMUM={target_temp}
  {% endif %}

  # Distances: fast feed through cold zone, slow through melt zone, then purge
  {% set fast_dist = v.sensor_to_gear + v.gear_to_nozzle - v.load_slow_start %}
  {% set slow_dist = v.load_slow_start %}

  SAVE_GCODE_STATE NAME=load_state
  G91   # Relative positioning
  M83   # Relative extrusion
  G92 E0

  # Fast feed from sensor through cold zone, stopping before melt zone
  RESPOND TYPE=echo MSG="T{T} loading..."
  G1 E{fast_dist | round(1)} F{v.load_speed_fast * 60}
  # Slow feed through melt zone to nozzle tip
  G1 E{slow_dist}            F{v.load_speed_slow * 60}
  # Purge to confirm flow and clear old filament
  G1 E{v.purge_length}       F{v.load_speed_slow * 60}

  RESTORE_GCODE_STATE NAME=load_state
  # Restore heater to its previous target
  SET_HEATER_TEMPERATURE HEATER={heater} TARGET={prev_target | int}
  RESPOND TYPE=echo MSG="T{T} loaded and purged"

#####################################################################
# IDEX Copy & Mirror Modes
#
# COPY   — both carriages move in the same X direction, same speed.
#          T1 starts at an X offset from T0.  Prints two identical
#          parts simultaneously side-by-side.
#
# MIRROR — T1 moves in the opposite X direction to T0.
#          T1 starts at the mirror-image X position.
#          Prints two mirrored parts simultaneously.
#
# Variables to set:
#   copy_x_start   — X position T0 homes to before entering copy mode
#   copy_x_t1      — X position T1 is placed at before copy mode engages
#                    (= T0 start + half bed width for symmetric copy)
#   mirror_x_t1    — X position T1 is placed at before mirror mode engages
#                    (= bed_max_x - copy_x_start for symmetric mirror)
#
# Input shaper values per mode can be filled in once measured.
# Leave at 0 to skip shaper changes.
#####################################################################

[gcode_macro _COPY_MIRROR_VARS]
variable_copy_x_start:    5.0    # T0 X start for copy/mirror (left edge of print)
variable_copy_x_t1:     205.0    # T1 X start for copy mode  (= copy_x_start + 200 mm)
                                 # gives 200 mm per part — matches FORMBOT COPY spec
variable_mirror_x_t1:   330.0    # T1 X start for mirror mode (mirror plane ≈ 167 mm)
                                 # gives ~162 mm per part — matches FORMBOT MIRROR spec
variable_mode:            0      # 0=normal 1=copy 2=mirror — do not edit
# Input shaper overrides per mode (set to 0 to skip)
variable_copy_shaper_freq_x:    0
variable_copy_shaper_freq_y:    0
variable_mirror_shaper_freq_x:  0
variable_mirror_shaper_freq_y:  0
gcode:  # variable holder

[gcode_macro ACTIVATE_COPY_MODE]
description: Engage IDEX copy mode — prints two identical parts simultaneously
gcode:
  {% set v = printer["gcode_macro _COPY_MIRROR_VARS"] %}
  RESPOND TYPE=echo MSG="Activating COPY mode"
  # Bring both carriages to primary mode first to allow independent moves
  SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
  G90
  G1 X{v.copy_x_t1} F{printer["gcode_macro _TOOLCHANGE_VARS"].park_speed}
  SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
  ACTIVATE_EXTRUDER EXTRUDER=extruder
  G1 X{v.copy_x_start} F{printer["gcode_macro _TOOLCHANGE_VARS"].park_speed}
  # Engage copy mode and sync extruder motion
  SET_DUAL_CARRIAGE CARRIAGE=1 MODE=COPY
  SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder
  SET_GCODE_VARIABLE MACRO=_COPY_MIRROR_VARS VARIABLE=mode VALUE=1
  # Optional input shaper override for copy mode
  {% if v.copy_shaper_freq_x > 0 %}
    SET_INPUT_SHAPER SHAPER_FREQ_X={v.copy_shaper_freq_x} SHAPER_FREQ_Y={v.copy_shaper_freq_y}
  {% endif %}
  RESPOND TYPE=echo MSG="COPY mode active — T1 offset from T0 by {v.copy_x_t1 - v.copy_x_start} mm"

[gcode_macro ACTIVATE_MIRROR_MODE]
description: Engage IDEX mirror mode — prints two mirrored parts simultaneously
gcode:
  {% set v = printer["gcode_macro _COPY_MIRROR_VARS"] %}
  RESPOND TYPE=echo MSG="Activating MIRROR mode"
  # Bring both carriages to primary mode first to allow independent moves
  SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
  G90
  G1 X{v.mirror_x_t1} F{printer["gcode_macro _TOOLCHANGE_VARS"].park_speed}
  SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
  ACTIVATE_EXTRUDER EXTRUDER=extruder
  G1 X{v.copy_x_start} F{printer["gcode_macro _TOOLCHANGE_VARS"].park_speed}
  # Engage mirror mode and sync extruder motion
  SET_DUAL_CARRIAGE CARRIAGE=1 MODE=MIRROR
  SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder
  SET_GCODE_VARIABLE MACRO=_COPY_MIRROR_VARS VARIABLE=mode VALUE=2
  # Optional input shaper override for mirror mode
  {% if v.mirror_shaper_freq_x > 0 %}
    SET_INPUT_SHAPER SHAPER_FREQ_X={v.mirror_shaper_freq_x} SHAPER_FREQ_Y={v.mirror_shaper_freq_y}
  {% endif %}
  RESPOND TYPE=echo MSG="MIRROR mode active"

[gcode_macro DEACTIVATE_COPY_MIRROR_MODE]
description: Return both carriages to normal independent IDEX mode
gcode:
  {% set v = printer["gcode_macro _COPY_MIRROR_VARS"] %}
  {% if v.mode != 0 %}
    RESPOND TYPE=echo MSG="Deactivating copy/mirror mode — returning to IDEX"
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_GCODE_VARIABLE MACRO=_COPY_MIRROR_VARS VARIABLE=mode VALUE=0
    # Restore input shaper to normal values if they were overridden
    {% if v.copy_shaper_freq_x > 0 or v.mirror_shaper_freq_x > 0 %}
      SET_INPUT_SHAPER SHAPER_FREQ_X={printer.configfile.settings.input_shaper.shaper_freq_x} SHAPER_FREQ_Y={printer.configfile.settings.input_shaper.shaper_freq_y}
    {% endif %}
  {% endif %}

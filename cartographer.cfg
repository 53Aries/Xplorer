#####################################################################
# Cartographer Eddy Current Scanner — cartographer.cfg
#
# Mounted on T0 carriage. Used for Z homing and bed mesh.
# Replaces a traditional [probe] — do NOT define [probe] elsewhere.
#
# INSTALL (run once on the host over SSH):
#   pip install cartographer-klipper   # or use the installer script
#   https://docs.cartographer3d.com/cartographer-probe/installation
#
# Add to moonraker.conf for automatic updates:
#   [update_manager cartographer]
#   type: git_repo
#   path: ~/cartographer-klipper
#   channel: stable
#   origin: https://github.com/Cartographer3D/cartographer-klipper.git
#   managed_services: klipper
#
# FIRST-TIME SETUP:
#   1. Set the correct serial/canbus_uuid below.
#   2. Set x_offset / y_offset to scanner position relative to T0 nozzle.
#   3. Home XY, then run: CARTOGRAPHER_CALIBRATE
#   4. Run CARTOGRAPHER_TOUCH to calibrate z_offset.
#   5. Run BED_MESH_CALIBRATE to generate initial mesh.
#####################################################################

#--------------------------------------------------------------------
# Cartographer MCU
# USB: find with: ls /dev/serial/by-id/*cartographer*
# CAN: find with: ~/klippy-env/bin/python ~/klipper/scripts/canbus_query.py can0
#--------------------------------------------------------------------

[mcu scanner]
serial: /dev/serial/by-id/usb-Cartographer_SERIALHERE
# canbus_uuid: XXXXXXXXXXXX  # Uncomment for CAN, comment out serial above
restart_method: command       # Required for USB probes; omit for CAN

#--------------------------------------------------------------------
# Scanner configuration
#--------------------------------------------------------------------

[cartographer]
mcu:                  scanner
x_offset:             0.0            # distance (mm) between probe and nozzle along X
y_offset:            -19.07          # distance (mm) between probe and nozzle along Y — probe is 19.07 mm in front of nozzle
travel_speed:         40.            # XY travel speed mm/s (default 50)
lift_speed:           5.             # Z lift speed mm/s (default 5)
verbose:              False          # set True to enable debug output
register_as_probe:    True           # registers Cartographer as the printer probe object

#--------------------------------------------------------------------
# Scan mode — used by Z_TILT_ADJUST and BED_MESH_CALIBRATE (default)
#--------------------------------------------------------------------

[cartographer scan]
probe_speed:          5              # Z speed (mm/s) when probing
mesh_runs:            2              # Number of scan passes — 2 averages out noise
mesh_height:          3              # Z height (mm) of the head during a scan run
mesh_direction:       x              # Primary axis for scan moves
mesh_path:            snake          # Scan path pattern (snake, alternating_snake, spiral, random)

#--------------------------------------------------------------------
# Touch mode — used by CARTOGRAPHER_TOUCH_HOME and CARTOGRAPHER_CALIBRATE
# Z_TILT_ADJUST always uses scan mode regardless of this section.
#--------------------------------------------------------------------

[cartographer touch]
samples:                        5     # touch samples per point (minimum 3)
max_samples:                    10    # abandon point after this many attempts
max_noisy_samples:              2     # noisy samples tolerated in the sliding window
UNSAFE_max_touch_temperature:   150   # max nozzle temp allowed for touch — change AT YOUR OWN RISK
EXPERIMENTAL_home_random_radius: 0.0  # radius (mm) around Z home position to randomise touch point
retract_distance:               2.0   # retract distance (mm) between samples (minimum 1.0)
sample_range:                   0.01  # acceptable spread (mm) between samples (min 0.001, max 0.015)

#--------------------------------------------------------------------
# Cartographer coil temperature sensor
#--------------------------------------------------------------------

[temperature_sensor cartographer_coil]
sensor_type: temperature_mcu
sensor_mcu:  scanner
min_temp:    5
max_temp:    105

#--------------------------------------------------------------------
# ADXL345 accelerometer (built into Cartographer V4)
#--------------------------------------------------------------------

[adxl345]
cs_pin:           scanner:PA0      # V4 — use scanner:PA3 for V3
spi_bus:          spi1

[resonance_tester]
accel_chip:       adxl345
probe_points:
    200, 208, 20                   # Bed centre — 400x415 bed, nozzle coords

#--------------------------------------------------------------------


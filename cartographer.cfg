#####################################################################
# Cartographer Eddy Current Scanner — cartographer.cfg
#
# Mounted on T0 carriage. Used for Z homing and bed mesh.
# Replaces a traditional [probe] — do NOT define [probe] elsewhere.
#
# INSTALL (run once on the host over SSH):
#   pip install cartographer-klipper   # or use the installer script
#   https://docs.cartographer3d.com/cartographer-probe/installation
#
# Add to moonraker.conf for automatic updates:
#   [update_manager cartographer]
#   type: git_repo
#   path: ~/cartographer-klipper
#   channel: stable
#   origin: https://github.com/Cartographer3D/cartographer-klipper.git
#   managed_services: klipper
#
# FIRST-TIME SETUP:
#   1. Set the correct serial/canbus_uuid below.
#   2. Set x_offset / y_offset to scanner position relative to T0 nozzle.
#   3. Home XY, then run: CARTOGRAPHER_CALIBRATE
#   4. Run CARTOGRAPHER_TOUCH to calibrate z_offset.
#   5. Run BED_MESH_CALIBRATE to generate initial mesh.
#####################################################################

#--------------------------------------------------------------------
# Cartographer MCU
# USB: find with: ls /dev/serial/by-id/*cartographer*
# CAN: find with: ~/klippy-env/bin/python ~/klipper/scripts/canbus_query.py can0
#--------------------------------------------------------------------

[mcu scanner]
serial: /dev/serial/by-id/usb-Cartographer_SERIALHERE
# canbus_uuid: XXXXXXXXXXXX  # Uncomment for CAN, comment out serial above

#--------------------------------------------------------------------
# Scanner configuration
#--------------------------------------------------------------------

[cartographer]
mcu:                  scanner
# serial / canbus_uuid inherited from [mcu scanner] above
speed:                40.             # Scan speed mm/s
lift_speed:           5.              # Z lift speed mm/s
backlash_comp:        0.5             # Compensation for backlash — tune after calibration

# Offset of the scanner lens from T0 nozzle.
# Measure on the physical mount. +X = to the right of nozzle, +Y = toward rear.
x_offset:             0.0            # UPDATE — scanner X offset from T0 nozzle (mm)
y_offset:             0.0            # UPDATE — scanner Y offset from T0 nozzle (mm)

trigger_distance:     2.             # Nominal trigger height above bed (mm)
trigger_dive_threshold: 1.5
trigger_hysteresis:   0.006

# Nozzle calibration touch settings
cal_nozzle_z:         0.1
cal_floor:            0.1
cal_ceil:             5.
cal_speed:            1.0
cal_move_speed:       10.

default_model_name:   default
mesh_runs:            2              # Number of passes for mesh — 2 = better accuracy

#--------------------------------------------------------------------
# Safe Z home — must home with T0 active (scanner is on T0)
# Position is scanner location over bed centre, accounting for offset.
# home_xy_position is set in printer.cfg [safe_z_home].
#--------------------------------------------------------------------

# Cartographer provides cartographer:z_virtual_endstop — referenced in
# mainboard.cfg stepper_z endstop_pin.

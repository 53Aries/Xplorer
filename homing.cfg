#####################################################################
# Homing Configuration
#
# Centralised homing logic for all axes.
# Stepper parameters (homing_speed, retract_dist, etc.) remain in
# each axis config file — only homing procedures live here.
#####################################################################

#####################################################################
# X Axis Homing — IDEX
#
# Both carriages must be homed independently.
# T0 (stepper_x) homes to Xmin; T1 (dual_carriage) homes to Xmax.
# SET_DUAL_CARRIAGE switches active carriage before each G28 X.
# Inside homing_override, G28 X calls native homing (no recursion).
#####################################################################

[gcode_macro _HOME_X]
description: Home both IDEX carriages
gcode:
  SET_DUAL_CARRIAGE CARRIAGE=0
  G28 X                                 # T0 → Xmin physical endstop
  SET_DUAL_CARRIAGE CARRIAGE=1
  G28 X                                 # T1 → Xmax physical endstop
  SET_DUAL_CARRIAGE CARRIAGE=0          # return to T0 as active carriage

#####################################################################
# Y Axis Homing — sensorless (TMC2240 StallGuard)
#
# Reduces run current before homing for better StallGuard sensitivity,
# restores it after, then backs off 20 mm from the rear frame.
#####################################################################

[gcode_macro _HOME_Y]
description: Sensorless home Y with current reduction
gcode:
  {% set run_current = printer.configfile.settings['tmc2240 stepper_y'].run_current %}
  # Lower current for reliable StallGuard trigger
  SET_TMC_CURRENT STEPPER=stepper_y  CURRENT=0.800
  SET_TMC_CURRENT STEPPER=stepper_y1 CURRENT=0.800
  G4 P500                                 # wait for current to stabilize
  G28 Y
  # Restore run current
  SET_TMC_CURRENT STEPPER=stepper_y  CURRENT={run_current}
  SET_TMC_CURRENT STEPPER=stepper_y1 CURRENT={run_current}
  # Back off from rear frame
  G91
  G1 Y-20 F1200
  G90

#####################################################################
# Homing Override — all axes
#
# Full sequence (bare G28) — order of operations:
#   1. Z  — all three motors lower to Zmax endstops independently (per-stepper trsync)
#   2. X  — T0 homes to Xmin, T1 homes to Xmax (both IDEX carriages)
#   3. Y  — both motors home to Ymax via StallGuard; each stalls independently
#            against the rear frame, forcing the gantry square
#   4. CARTOGRAPHER_TOUCH — scanner moves to randomised bed-centre XY,
#            touches bed, sets Z=0 at nozzle contact point
#
# Partial sequences:
#   G28 X      → step 2 only (_HOME_X)
#   G28 Y      → step 3 only (_HOME_Y, sensorless with current reduction)
#   G28 Z      → step 1 + step 4 (X and Y must already be homed for step 4)
#   G28 X Y    → steps 2 + 3, no Z
#   G28 X Y Z  → all four steps in order
#
# Inside this override, G28 <axis> calls Klipper's native homing
# (in_script guard prevents recursion).
#####################################################################

[homing_override]
axes: xyz
set_position_x: 0
set_position_y: 0
set_position_z: 0
gcode:
  {% set home_all = 'X' not in params and 'Y' not in params and 'Z' not in params %}

  # Step 1 — Z to Zmax endstops (each motor stops on its own endstop)
  {% if home_all or 'Z' in params %}
    G90
    G28 Z
  {% endif %}

  # Step 2 — X (both IDEX carriages)
  {% if home_all or 'X' in params %}
    _HOME_X
  {% endif %}

  # Step 3 — Y (sensorless StallGuard with current reduction)
  {% if home_all or 'Y' in params %}
    _HOME_Y
  {% endif %}

  # Step 4 — CARTOGRAPHER_TOUCH to establish precise Z=0
  # Requires X and Y to be homed for the approach move.
  {% if home_all or 'Z' in params %}
    {% if 'x' in printer.toolhead.homed_axes and 'y' in printer.toolhead.homed_axes %}
      # Randomize touch point ±5 mm around bed center (X=170, Y=225)
      {% set cx = 170 %}
      {% set cy = 225 %}
      {% set rng = 5 %}
      {% set rx = range((cx - rng)|int, (cx + rng)|int + 1)|random %}
      {% set ry = range((cy - rng)|int, (cy + rng)|int + 1)|random %}
      G1 X{rx} Y{ry} F9000             # move to randomized Cartographer probe XY
      G1 Z10 F3000                     # ascend to approach height
      CARTOGRAPHER_TOUCH               # touch bed — sets Z=0 at nozzle-bed contact
      G1 Z10 F1200                     # lift to clearance
    {% else %}
      { action_respond_info("Skipping CARTOGRAPHER_TOUCH — home X and Y first") }
    {% endif %}
  {% endif %}

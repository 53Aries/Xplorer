#####################################################################
# Nozzle Camera — T1 toolhead
# USB endoscope mounted on T1 carriage, pointing down at bed.
#
# WIRING NOTE — the H36 v2 has an onboard USB hub. The camera connects
# to a USB-A port on the H36; the hub routes it to the Pi through the
# same USB cable that carries the Klipper MCU connection. No separate
# cable run to the Pi is needed.
#
#   Yellow  LED+   → H36 5V pin  (LED always on when printer is powered)
#   Green   D+  ┐
#   White   D-  ├→ H36 USB-A port (hub routes to Pi automatically)
#   Red     5V  │
#   Black   GND ┘
#
# The LED has no software control — it is on whenever the printer is
# powered. This is acceptable for a scan-only camera.
#
# The camera will appear on the Pi as /dev/video0 (or video1/2 if
# other USB cameras are present — check: ls /dev/video*).
#
# ALSO CONFIGURE (outside this file):
#   ~/printer_data/config/crowsnest.conf  — add a [cam nozzle_cam] section
#   ~/printer_data/config/moonraker.conf  — add a [webcam nozzle_cam] section
#   See commented templates at the bottom of this file.
#####################################################################

#####################################################################
# SkewCamera Scan — Preparation Macro
#
# SkewCamera runs as a Python script on the Pi and drives the printer
# via Moonraker. This macro homes and positions T1 at bed centre so
# the script can start immediately when invoked from the host.
#
# Workflow:
#   1. Print a ChArUco board at 100% scale, lay it flat on the bed.
#   2. Run:  SKEW_SCAN_PREPARE
#   3. SSH to Pi and run SkewCamera (see SKEW_SCAN_RUN below if
#      gcode_shell_command is installed).
#####################################################################

[gcode_macro _NOZZLE_CAM_VARS]
variable_scan_x:    150.0   # X to park T1 before SkewCamera takes over (bed centre)
variable_scan_y:    225.0   # Y to park T1 before SkewCamera takes over (bed centre)
variable_scan_z:    20.0    # Z clearance during scan
gcode:  # variable holder — no gcode needed

[gcode_macro SKEW_SCAN_PREPARE]
description: Home, activate T1, move to bed centre — then run SkewCamera from host
gcode:
  {% set v = printer["gcode_macro _NOZZLE_CAM_VARS"] %}
  {% if not 'x' in printer.toolhead.homed_axes or
        not 'y' in printer.toolhead.homed_axes or
        not 'z' in printer.toolhead.homed_axes %}
    G28
  {% endif %}
  T1
  G90
  G0 Z{v.scan_z} F2000
  G0 X{v.scan_x} Y{v.scan_y} F8000
  RESPOND TYPE=echo MSG="T1 positioned at bed centre. Run SkewCamera from host now."
  RESPOND TYPE=echo MSG="  python3 ~/SkewCamera/skew_camera.py --moonraker http://localhost:7125"

[gcode_macro SKEW_SCAN_DONE]
description: Return to T0 after SkewCamera finishes
gcode:
  T0
  RESPOND TYPE=echo MSG="Scan complete. Apply SET_SKEW values from SkewCamera output."

#####################################################################
# Optional: invoke SkewCamera directly from a macro
# Requires the gcode_shell_command Klipper extra:
#   https://github.com/dw-0/kiauh  (install via KIAUH → Extensions)
# Uncomment and set path to your SkewCamera install location.
#####################################################################

# [gcode_shell_command run_skew_camera]
# command:    python3 /home/pi/SkewCamera/skew_camera.py
#               --moonraker http://localhost:7125
#               --camera   http://localhost/webcam2/snapshot
#               --toolhead T1
# timeout:    120
# verbose:    True

# [gcode_macro SKEW_SCAN_RUN]
# description: Run full SkewCamera scan from this macro (requires gcode_shell_command)
# gcode:
#   SKEW_SCAN_PREPARE
#   RUN_SHELL_COMMAND CMD=run_skew_camera
#   SKEW_SCAN_DONE

#####################################################################
# crowsnest.conf template — add to ~/printer_data/config/crowsnest.conf
#####################################################################
# [cam nozzle_cam]
# mode:           ustreamer
# enable_rtsp:    false
# port:           8081            # use 8080 if this is your only cam, else 8081+
# device:         /dev/video0     # confirm with: ls /dev/video*
# resolution:     1920x1080       # or whatever your endoscope supports
# max_fps:        15
# custom_flags:   --brightness 60 --contrast 60

#####################################################################
# moonraker.conf template — add to ~/printer_data/config/moonraker.conf
#####################################################################
# [webcam nozzle_cam]
# location:       toolhead
# icon:           mdiCamera
# enabled:        True
# service:        ustreamer
# target_fps:     15
# stream_url:     /webcam2/stream       # adjust port number to match crowsnest
# snapshot_url:   /webcam2/snapshot     # SkewCamera uses this URL
# flip_horizontal: false
# flip_vertical:  false
# rotation:       0

#####################################################################
# Z Axis Configuration
#
# 3-motor Z gantry — independent Zmax endstops per motor
#   stepper_z  (front-left)  — Mainboard M3  — Zmax endstop PF2
#   stepper_z1 (back-center) — Mainboard M4  — Zmax endstop PF1
#   stepper_z2 (front-right) — Mainboard M5  — Zmax endstop PF0
#
# Homing sequence (two-phase):
#   Phase 1 — FORCE_MOVE each stepper independently to its own
#              Zmax physical endstop, then establish kinematic position
#   Phase 2 — Z_TILT_ADJUST via Cartographer probe to level gantry
#              (called from PRINT_START after G28)
#####################################################################

[force_move]
enable_force_move: True

#####################################################################
# Stepper Z — Front-Left (Mainboard M3)
#####################################################################

[stepper_z]
step_pin:                PB8
dir_pin:                 PB7
enable_pin:             !PE0
microsteps:              32
rotation_distance:       40
gear_ratio:              80:16
full_steps_per_rotation: 200
endstop_pin:            ^PF2             # Zmax physical endstop — front-left
position_endstop:        400             # UPDATE after first homing / measurement
position_max:            401
position_min:           -3              # Small negative allows fine tramming
homing_speed:            10
second_homing_speed:     5
homing_retract_dist:     5.0
homing_positive_dir:     true           # Home toward Zmax (physical top of travel)

[tmc2209 stepper_z]
uart_pin:                PB9
run_current:             1.400
hold_current:            0.900
stealthchop_threshold:   999999
interpolate:             False

#####################################################################
# Stepper Z1 — Back-Center (Mainboard M4)
#####################################################################

[stepper_z1]
step_pin:                PB4
dir_pin:                 PB3
enable_pin:             !PB6
microsteps:              32
rotation_distance:       40
gear_ratio:              80:16
full_steps_per_rotation: 200
endstop_pin:            ^PF1             # Zmax physical endstop — back-center

[tmc2209 stepper_z1]
uart_pin:                PB5
run_current:             1.400
hold_current:            0.900
stealthchop_threshold:   999999
interpolate:             False

#####################################################################
# Stepper Z2 — Front-Right (Mainboard M5)
#####################################################################

[stepper_z2]
step_pin:                PG13
dir_pin:                 PG12
enable_pin:             !PG15
microsteps:              32
rotation_distance:       40
gear_ratio:              80:16
full_steps_per_rotation: 200
endstop_pin:            ^PF0             # Zmax physical endstop — front-right

[tmc2209 stepper_z2]
uart_pin:                PG14
run_current:             1.400
hold_current:            0.900
stealthchop_threshold:   999999
interpolate:             False

#####################################################################
# Z Tilt — 3-point gantry leveling via Cartographer probe
#####################################################################

[z_tilt]
z_positions:
   -60.1, -3.9           # stepper_z  belt anchor (front-left)
    210,  537.5           # stepper_z1 belt anchor (back-center)
    481.1, -3.9           # stepper_z2 belt anchor (front-right)
points:
    80,  40               # probe point aligned to front-left motor
   210, 360               # probe point aligned to back motor
   340,  40               # probe point aligned to front-right motor
speed:              250
horizontal_move_z:  7
retries:            10
retry_tolerance:    0.025

#####################################################################
# Homing Override — two-phase Z homing
#
# axes: z only — X and Y use their normal endstops unmodified.
#
# Phase 1: FORCE_MOVE each stepper independently to its own Zmax
#          physical endstop (STOP_ON_ENDSTOP=1 halts on trigger).
#          SET_KINEMATIC_POSITION re-synchronises all three steppers,
#          then a fast descent brings the gantry down to approach height.
#
# Phase 2: CARTOGRAPHER_TOUCH probes the bed surface, detects contact,
#          and sets Z=0 at the exact nozzle-bed position.
#
# Z_TILT_ADJUST and BED_MESH_CALIBRATE are called from PRINT_START
# after G28 completes.
#####################################################################

[homing_override]
axes: z
set_position_z: 0
gcode:
  G90                                   # Absolute mode

  # Phase 1 — drive each Z stepper to its own Zmax endstop
  FORCE_MOVE STEPPER=stepper_z  DISTANCE=450 VELOCITY=10 ACCEL=100 STOP_ON_ENDSTOP=1
  FORCE_MOVE STEPPER=stepper_z1 DISTANCE=450 VELOCITY=10 ACCEL=100 STOP_ON_ENDSTOP=1
  FORCE_MOVE STEPPER=stepper_z2 DISTANCE=450 VELOCITY=10 ACCEL=100 STOP_ON_ENDSTOP=1
  SET_KINEMATIC_POSITION Z=401
  G1 Z390 F600                          # back off endstops

  # Phase 2 — Cartographer touch for accurate Z=0
  G1 X150 Y150 F9000                    # move to probe XY (matches safe_z_home position)
  G1 Z30 F3000                          # fast descent to approach height
  CARTOGRAPHER_TOUCH                    # touch bed — sets Z=0 at nozzle-bed contact
  G1 Z10 F1200                          # lift to clearance

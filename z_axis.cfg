#####################################################################
# Z Axis Configuration
#
# 3-motor Z gantry — independent Zmax endstops per motor
#   stepper_z  (front-left)  — Mainboard M3  — Zmax endstop PF2
#   stepper_z1 (back-center) — Mainboard M4  — Zmax endstop PF1
#   stepper_z2 (front-right) — Mainboard M5  — Zmax endstop PF0
#
# Homing sequence (native Klipper multi-Z):
#   G28 Z — all three motors lower together; each stops independently
#     when its own Zmax endstop triggers (per-stepper trsync).
#     The drip-move continues until stepper_z (primary) triggers.
#   CARTOGRAPHER_TOUCH — sets accurate Z=0 at nozzle-bed contact.
#   Z_TILT_ADJUST + BED_MESH_CALIBRATE — called from PRINT_START.
#####################################################################

#####################################################################
# Stepper Z — Front-Left (Mainboard M3)
#####################################################################

[stepper_z]
step_pin:                PB8
dir_pin:                 PB7
enable_pin:             !PE0
microsteps:              32
rotation_distance:       40
gear_ratio:              80:16
full_steps_per_rotation: 200
endstop_pin:            ^PF2             # Zmax physical endstop — front-left
position_endstop:        400             # UPDATE after first homing / measurement
position_max:            401
position_min:           -3              # Small negative allows fine tramming
homing_speed:            10
second_homing_speed:     5
homing_retract_dist:     20.0
homing_positive_dir:     true           # Home toward Zmax

[tmc2209 stepper_z]
uart_pin:                PB9
run_current:             1.400
hold_current:            0.900
stealthchop_threshold:   0
interpolate:             False

#####################################################################
# Stepper Z1 — Back-Center (Mainboard M4)
#####################################################################

[stepper_z1]
step_pin:                PB4
dir_pin:                 PB3
enable_pin:             !PB6
microsteps:              32
rotation_distance:       40
gear_ratio:              80:16
full_steps_per_rotation: 200
endstop_pin:            ^PF1             # Zmax physical endstop — back-center

[tmc2209 stepper_z1]
uart_pin:                PB5
run_current:             1.400
hold_current:            0.900
stealthchop_threshold:   0
interpolate:             False

#####################################################################
# Stepper Z2 — Front-Right (Mainboard M5)
#####################################################################

[stepper_z2]
step_pin:                PG13
dir_pin:                 PG12
enable_pin:             !PG15
microsteps:              32
rotation_distance:       40
gear_ratio:              80:16
full_steps_per_rotation: 200
endstop_pin:            ^PF0             # Zmax physical endstop — front-right

[tmc2209 stepper_z2]
uart_pin:                PG14
run_current:             1.400
hold_current:            0.900
stealthchop_threshold:   0
interpolate:             False

# safe_z_home removed — conflicts with [homing_override] in homing.cfg.
# XY positioning before CARTOGRAPHER_TOUCH is handled in homing_override.

#####################################################################
# Z Tilt — 3-point gantry leveling via Cartographer probe
#####################################################################

[z_tilt]
z_positions:
   -60.1, -3.9           # stepper_z  belt anchor (front-left)
    210,  537.5           # stepper_z1 belt anchor (back-center)
    481.1, -3.9           # stepper_z2 belt anchor (front-right)
points:
    80,  40               # probe point aligned to front-left motor
   210, 360               # probe point aligned to back motor
   340,  40               # probe point aligned to front-right motor
speed:              250
horizontal_move_z:  7
retries:            10
retry_tolerance:    0.025

#####################################################################
# Bed Mesh — Cartographer scan-based leveling
#####################################################################

[bed_mesh]
speed:                300
horizontal_move_z:    3
mesh_min:             10, 25        # probe coords — nozzle at (10, 44.07) to reach front edge
mesh_max:             330, 380      # probe coords — nozzle at (330, 399.07); T0 X max=340, Y max=450
probe_count:          20, 20        # dense mesh — Cartographer scan handles this efficiently
mesh_pps:             0, 0          # disable interpolation — not needed with dense scan mesh
algorithm:            bicubic
bicubic_tension:      0.2
adaptive_margin:      10
zero_reference_position: 200, 189   # probe coords at bed centre (nozzle 200,208 → probe 200,208−19.07=188.93)

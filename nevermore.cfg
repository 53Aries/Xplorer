#####################################################################
# Nevermore StealthMax V2 — VOC filter with servo vent control
#
# Connection: USB serial (Pi Pico via USB)
#   Find your serial path:  ls /dev/serial/by-id/
#   It will look like:  usb-Nevermore_Nevermore_Controller_XXXXXX-if00
#
# LEDs: WS2812 on GP12 (set in firmware — chain count configured below)
#
# Vent servo logic:
#   PERCENT=0.0 → closed — recirculates chamber air through the filter
#   PERCENT=1.0 → open   — exhausts chamber to outside / intake from room
#   (adjust pulse widths below if your servo doesn't reach full travel)
#####################################################################

[nevermore]
serial: /dev/serial/by-id/usb-Nevermore_Nevermore_Controller_XXXXXX-if00   # FILL IN

# LEDs — WS2812, data on GP12 (configured in firmware)
led_chain_count:  7    # WS2812 5050 RGB ring
led_colour_order: GRB  # WS2812 standard colour order

# Fan speeds (0.0–1.0)
fan_power_passive:    0.0   # fan off when printer is idle
fan_power_automatic:  1.0   # full speed during print mode

# Fan policy — keep filtering after print ends even if VOC has dropped
fan_policy_cooldown:     900   # run for 15 min after print mode ends
fan_policy_voc_passive_max:  150   # below this VOC index → passive (fan off) when idle

# Print mode: activates the filter when the bed is targeting this temp or above
print_mode_min_bed_target: 50   # °C — covers PETG, ABS, ASA, PA, etc.

# Servo pulse widths — standard RC servo range (1 ms–2 ms)
# Narrow the range here if your servo over-travels at the extremes
vent_servo_pulse_width_min: 0.001   # seconds → PERCENT=0.0 (closed)
vent_servo_pulse_width_max: 0.002   # seconds → PERCENT=1.0 (open)


#####################################################################
# Vent Servo Controls
#####################################################################

[gcode_macro NEVERMORE_VENT_CLOSE]
description: Close Nevermore vent — recirculate chamber air through filter
gcode:
  NEVERMORE_VENT_SERVO_SET PERCENT=0.0

[gcode_macro NEVERMORE_VENT_OPEN]
description: Open Nevermore vent — exhaust/intake from room
gcode:
  NEVERMORE_VENT_SERVO_SET PERCENT=1.0

[gcode_macro NEVERMORE_VENT_HALF]
description: Set Nevermore vent to 50% open
gcode:
  NEVERMORE_VENT_SERVO_SET PERCENT=0.5

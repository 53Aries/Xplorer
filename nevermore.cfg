#####################################################################
# Nevermore StealthMax V2 — VOC filter with servo vent control
#
# Connection: USB serial (Pi Pico via USB)
#   Find your serial path:  ls /dev/serial/by-id/
#   It will look like:  usb-Nevermore_Nevermore_Controller_XXXXXX-if00
#
# LEDs: WS2812 on GP12 (set in firmware — chain count configured below)
#
# Vent servo logic:
#   PERCENT=0.0 → closed — recirculates chamber air through the filter
#   PERCENT=1.0 → open   — exhausts chamber to outside / intake from room
#   (adjust pulse widths below if your servo doesn't reach full travel)
#####################################################################

[nevermore]
serial: /dev/serial/by-id/usb-Nevermore_Nevermore_Controller_XXXXXX-if00   # FILL IN

# LEDs — WS2812, data on GP12 (configured in firmware)
led_chain_count:  7    # WS2812 5050 RGB ring
led_colour_order: GRB  # WS2812 standard colour order

# Fan speeds (0.0–1.0)
fan_power_passive:    0.0   # fan off when printer is idle
fan_power_automatic:  1.0   # full speed during print mode
fan_power_minimum:    0.5   # floor during print mode — must be high enough that the fan
                            # can create negative pressure even at low VOC levels.
                            # If pressure control can't reach setpoint with vent fully open,
                            # raise this value. 0.5 is a safe starting point.

# Fan policy — keep filtering after print ends even if VOC has dropped
fan_policy_cooldown:     900   # run for 15 min after print mode ends
fan_policy_voc_passive_max:  150   # below this VOC index → passive (fan off) when idle

# Print mode: activates the filter when the bed is targeting this temp or above
print_mode_min_bed_target: 50   # °C — covers PETG, ABS, ASA, PA, etc.

# Servo pulse widths — standard RC servo range (1 ms–2 ms)
# Narrow the range here if your servo over-travels at the extremes
vent_servo_pulse_width_min: 0.001   # seconds → PERCENT=0.0 (closed)
vent_servo_pulse_width_max: 0.002   # seconds → PERCENT=1.0 (open)


#####################################################################
# Differential Pressure Sensor — MPXV7002DP
#
# Wiring (5V supply + voltage divider for 3.3V ADC):
#   MPXV VCC  → M8P 5V
#   MPXV GND  → GND
#   MPXV VOUT → R1 (20kΩ) → [ADC pin below] → R2 (30kΩ) → GND
#   MPXV P1   → tube to INSIDE the chamber
#   MPXV P2   → tube to OUTSIDE (ambient reference)
#
# Transfer function at 5V supply, after ×0.6 divider:
#   -2000 Pa → 0.30 V ADC
#      0 Pa → 1.50 V ADC
#   +2000 Pa → 2.70 V ADC
#
# Negative Pa = chamber below ambient = desired negative pressure
#####################################################################

[temperature_sensor chamber_pressure]
sensor_type:  adc_temperature
sensor_pin:   PC4        # FILL IN: any free thermistor port on the M8P
adc_voltage:  3.3
smooth_time:  3.0        # 3 s averaging to reduce ADC noise
voltage1: 0.30
temperature1: -2000
voltage2: 2.70
temperature2: 2000


#####################################################################
# Negative Pressure Control
#
# Servo is driven proportionally to the pressure error:
#   PERCENT = 0.5 + (measured_Pa - setpoint_Pa) × kp
#   PERCENT=0.0 → vent closed (recirculate)   PERCENT=1.0 → vent open (exhaust)
#
# Increasing kp makes the servo respond more aggressively per Pa of error.
# Start conservative — 0.02 gives full servo travel over ±25 Pa of error.
#
# Door detection: if pressure rises above door_threshold (less negative
# than expected), something has disrupted the chamber — go full-open to
# exhaust VOCs rather than letting them leak out unfiltered.
#####################################################################

[gcode_macro _PRESSURE_VARS]
variable_active:          0
variable_setpoint:      -20     # Pa — target differential (negative = below ambient)
variable_kp:           0.02     # proportional gain (servo %/Pa)
variable_door_threshold: -5     # Pa — above this = door open or major disturbance
variable_interval:        1.0   # seconds between loop iterations
gcode:

[delayed_gcode PRESSURE_CONTROL_LOOP]
initial_duration: 0
gcode:
  {% set v = printer['gcode_macro _PRESSURE_VARS'] %}
  {% if v.active %}
    {% set pressure  = printer['temperature_sensor chamber_pressure'].temperature | float %}
    {% set setpoint  = v.setpoint | float %}
    {% set kp        = v.kp | float %}
    {% set threshold = v.door_threshold | float %}

    {% if pressure > threshold %}
      # Door opened or large disturbance — full exhaust to clear VOCs
      RESPOND TYPE=echo MSG="Chamber pressure {pressure | round(1)} Pa — door open, venting fully"
      NEVERMORE_VENT_SERVO_SET PERCENT=1.0
    {% else %}
      # Proportional control — open vent more when not negative enough
      {% set servo_raw = 0.5 + (pressure - setpoint) * kp %}
      {% set servo = [[servo_raw, 0.0] | max, 1.0] | min %}
      NEVERMORE_VENT_SERVO_SET PERCENT={servo | round(3)}
      # Saturation warning: if vent is fully open and we're still not at setpoint,
      # the fan doesn't have enough flow authority — raise fan_power_minimum in [nevermore]
      {% if servo >= 1.0 and pressure > setpoint %}
        RESPOND TYPE=echo MSG="WARNING: Vent saturated at 100% but pressure is {pressure | round(1)} Pa (target {setpoint} Pa) — increase fan_power_minimum"
      {% endif %}
    {% endif %}

    UPDATE_DELAYED_GCODE ID=PRESSURE_CONTROL_LOOP DURATION={v.interval}
  {% endif %}

[gcode_macro PRESSURE_CONTROL_START]
description: Start negative pressure control loop (called at print start)
gcode:
  SET_GCODE_VARIABLE MACRO=_PRESSURE_VARS VARIABLE=active VALUE=1
  UPDATE_DELAYED_GCODE ID=PRESSURE_CONTROL_LOOP DURATION=1
  RESPOND TYPE=echo MSG="Negative pressure control active — target {printer['gcode_macro _PRESSURE_VARS'].setpoint} Pa"

[gcode_macro PRESSURE_CONTROL_STOP]
description: Stop pressure control loop and open vent (called at print end)
gcode:
  SET_GCODE_VARIABLE MACRO=_PRESSURE_VARS VARIABLE=active VALUE=0
  UPDATE_DELAYED_GCODE ID=PRESSURE_CONTROL_LOOP DURATION=0
  NEVERMORE_VENT_OPEN
  RESPOND TYPE=echo MSG="Negative pressure control stopped — vent open"


#####################################################################
# Vent Servo — Manual Controls
#####################################################################

[gcode_macro NEVERMORE_VENT_CLOSE]
description: Close Nevermore vent — recirculate chamber air through filter
gcode:
  PRESSURE_CONTROL_STOP
  NEVERMORE_VENT_SERVO_SET PERCENT=0.0

[gcode_macro NEVERMORE_VENT_OPEN]
description: Open Nevermore vent — exhaust/intake from room
gcode:
  NEVERMORE_VENT_SERVO_SET PERCENT=1.0

[gcode_macro NEVERMORE_VENT_HALF]
description: Set Nevermore vent to 50% open
gcode:
  PRESSURE_CONTROL_STOP
  NEVERMORE_VENT_SERVO_SET PERCENT=0.5
